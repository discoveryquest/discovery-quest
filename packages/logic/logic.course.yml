  narration:
    # prompts (must equal each mission's prompt text)
    pr-fd-5to3: "Move one match to turn the 5 into a 3."
    pr-fd-5to3-ok: "Yes! Slide the left match over and the 5 becomes a 3. Same matches, new number!"
    pr-fd-5to3-hint: "Look at the top-left match. Where could it go to close up the 3?"
    pr-fd-6to9: "Move one match to turn the 6 into a 9."
    pr-fd-6to9-ok: "A 9! You flipped it by moving one match from the bottom to the top."
    pr-fd-6to9-hint: "A 9 is just a 6 standing on its head. Try moving the bottom-left match up."
    pr-fd-2to3: "Move one match to turn the 2 into a 3."
    pr-fd-2to3-ok: "That's a 3! The bottom-left match swung around to the right side."
    pr-fd-2to3-hint: "A 2 and a 3 are almost twins. Only the bottom-left corner is different!"
    pr-te-225: "This says 2 plus 2 equals 5 — that's wrong! Move one match to make it true."
    pr-te-225-ok: "Three plus two IS five. One little match fixed the whole equation!"
    pr-te-225-hint: "Could one of those 2s become a 3? Check its bottom corner."
    pr-te-546: "5 plus 4 equals 6? No way! Move one match to fix it."
    pr-te-546-ok: "Five plus four is nine — you turned the 6 into a 9 and made it true!"
    pr-te-546-hint: "The answer side is the problem. What number is 5 plus 4? Can the 6 become it?"
    pr-te-609: "6 plus 0 equals 9 is broken. One match move makes it true!"
    pr-te-609-ok: "True at last! Sometimes more than one move works — any true equation wins."
    pr-te-609-hint: "Try changing the 6 or the 9 — they're one match apart from each other."
    pr-bn-50: "Move one match to make the biggest number you can from 50."
    pr-bn-50-ok: "Fifty-nine! Moving one match inside the 0 turned it into a 9."
    pr-bn-50-hint: "You can't grow the 5. But that 0 is hiding a bigger digit inside it!"
    pr-bn-16: "Make the biggest number you can from 16 — one move!"
    pr-bn-16-ok: "Seventy-five! Move one match off the 6 to make a 5, and onto the 1 to make a 7."
    pr-bn-16-hint: "A bigger FIRST digit helps most. Can the 1 become a 7? Borrow a match from the 6!"
    pr-bn-23: "One match move — turn 23 into the biggest number possible."
    pr-bn-23-ok: "Thirty-three! Turning the 2 into a 3 beats every other move."
    pr-bn-23-hint: "Try making the FIRST digit bigger — that helps the most!"
    pr-tm-60: "Two moves this time! Make the biggest number you can from 60."
    pr-tm-60-ok: "Ninety-nine! Both digits flipped into 9s — the biggest two-digit number there is!"
    pr-tm-60-hint: "The 6 can become a 9... and so can the 0. That's your two moves!"
    pr-tm-68: "With two moves, push 68 as high as it will go!"
    pr-tm-68-ok: "You found the biggest! Two clever moves, maximum number."
    pr-tm-68-hint: "Start by making the first digit as big as it can get, then look at the second."
    pr-tm-26: "Last one, master puzzler — two moves to make 26 as big as possible!"
    pr-tm-26-ok: "Maximum reached! You're a true Two-Move Master!"
    pr-tm-26-hint: "Bigger first digit first! Then see what the 6 can turn into."
    # Shape Shore
    pr-ss-row: "How many squares can you find in this strip?"
    pr-ss-row-ok: "Three squares, side by side. Watch them light up!"
    pr-ss-row-hint: "Count each little square one at a time, left to right."
    pr-ss-2x2: "Count every square in this window — big ones count too!"
    pr-ss-2x2-ok: "Five! Four little squares, and the big one made of all four."
    pr-ss-2x2-hint: "Don't forget: the WHOLE window is a square too!"
    pr-ss-2x3: "Trickier now! How many squares hide in this grid?"
    pr-ss-2x3-ok: "Eight! Six little ones, plus two big two-by-two squares hiding inside."
    pr-ss-2x3-hint: "Count the small squares first. Then look for bigger squares made of four little ones."
    pr-ts-cev: "Tap three corners to claim each triangle you spot!"
    pr-ts-cev-ok: "All three claimed! Two small triangles, and the big one holding them both."
    pr-ts-cev-hint: "That's not one of them — try the two small triangles first, then the big outside one."
    pr-ts-sqd: "The diagonal cuts the square — claim both triangles!"
    pr-ts-sqd-ok: "Both halves claimed! One diagonal, two triangles."
    pr-ts-sqd-hint: "Each triangle uses two square corners and both ends of the diagonal."
    pr-ts-mid: "One little triangle rides inside the big one. Claim them both!"
    pr-ts-mid-ok: "Got them! The little triangle at the top, and the big one around it."
    pr-ts-mid-hint: "The little triangle sits at the very top. The big one uses the three outside corners."
    pr-ht-2c: "Count ALL the triangles — some are made of smaller ones!"
    pr-ht-2c-ok: "Six! Three single slices, two doubles, and the whole big triangle."
    pr-ht-2c-hint: "Count the single slices first, then triangles made of two slices, then the whole thing."
    pr-ht-star: "The diagonals make a secret X. How many triangles in all?"
    pr-ht-star-ok: "Eight! Four small ones around the middle, and four bigger halves."
    pr-ht-star-hint: "Four little triangles touch the centre. Then look for big ones made of two."
    pr-ht-3c: "The master fan! Count every triangle, big and small."
    pr-ht-3c-ok: "Ten! Singles, doubles, triples, and the giant one — you counted like a master."
    pr-ht-3c-hint: "Go by size: four singles, then doubles, then triples, then the whole fan."
    pr-rh-row: "How many rectangles in this strip? Squares count too!"
    pr-rh-row-ok: "Six! Three singles, two doubles, and the whole strip."
    pr-rh-row-hint: "Singles first, then rectangles made of two squares, then the whole strip."
    pr-rh-2x2: "Count all the rectangles — wide ones, tall ones, square ones!"
    pr-rh-2x2-ok: "Nine! Four singles, four dominoes, and the big square."
    pr-rh-2x2-hint: "Squares are rectangles too. Count singles, then two-square dominoes, then the big one."
    pr-rh-2x3: "The final hunt! Every rectangle in the big grid counts."
    pr-rh-2x3-ok: "Eighteen! You found every size — the grid held a whole family of rectangles."
    pr-rh-2x3-hint: "Go size by size: singles, dominoes across and down, rows, big squares… take your time!"
    # Pattern Peaks
    pr-wn-ab: "Apple, banana, apple, banana… what comes next?"
    pr-wn-ab-ok: "Banana! The pattern takes turns: apple, banana, again and again."
    pr-wn-ab-hint: "Say the pattern out loud — apple, banana, apple, banana, apple…"
    pr-wn-abb: "Red, blue, blue… the pattern repeats. What's next?"
    pr-wn-abb-ok: "Blue! The rule is red, then TWO blues — and the blues weren't finished."
    pr-wn-abb-hint: "Clap it out: red, blue, blue! Red, blue, blue! What follows red?"
    pr-wn-abc: "Dog, cat, mouse, dog, cat… who's next?"
    pr-wn-abc-ok: "The mouse! Three friends take turns, and it was mouse's turn."
    pr-wn-abc-hint: "The parade repeats every three: dog, cat, mouse. Who follows the cat?"
    pr-gp-plus1: "The dots keep growing! How many come next?"
    pr-gp-plus1-ok: "Four dots! The pattern grows by one each time: one, two, three, four."
    pr-gp-plus1-hint: "Count each group: one, two, three… how many should come next?"
    pr-gp-plus2: "One star, three stars, five stars… what comes next?"
    pr-gp-plus2-ok: "Seven stars! It jumps by two each time: one, three, five, seven."
    pr-gp-plus2-hint: "Count the jump: from one to three is two more. From three to five? Keep jumping!"
    pr-gp-shrink: "This pattern shrinks! What comes next?"
    pr-gp-shrink-ok: "Just one! The pattern loses a square each step: four, three, two, one."
    pr-gp-shrink-hint: "It's going DOWN: four, three, two… what's left?"
    pr-oo-fruit: "Three of these are fruit. Tap the one that doesn't belong!"
    pr-oo-fruit-ok: "The car! Apples, pears and bananas are fruit — a car definitely isn't."
    pr-oo-fruit-hint: "Which of these can you NOT eat?"
    pr-oo-sea: "Almost all of these live in the sea. Who doesn't?"
    pr-oo-sea-ok: "The eagle! Fish, dolphins and sharks swim — eagles fly."
    pr-oo-sea-hint: "Think about where each animal lives. Who belongs in the sky?"
    pr-oo-flip: "Look closely at the triangles. Tap the different one!"
    pr-oo-flip-ok: "That one points DOWN while the others point up. Sharp eyes!"
    pr-oo-flip-hint: "They're all triangles… but look at which way each one points."
    pr-pg-latin: "Every row has a sun, a moon, and a star. What's missing?"
    pr-pg-latin-ok: "The sun! The last row had a moon and a star — it needed its sun."
    pr-pg-latin-hint: "Check the last row: moon, star… which of the three friends is missing?"
    pr-pg-count: "Each row grows: one, two, three. Finish the last row!"
    pr-pg-count-ok: "Three green hearts! Every row counts up: one, two, three."
    pr-pg-count-hint: "Look at the red row and the blue row: one, two, three. The green row wants the same!"
    pr-pg-colors: "The colour code shifts every row. Crack the last square!"
    pr-pg-colors-ok: "Yellow! Each row slides the colours one step — you cracked the code."
    pr-pg-colors-hint: "Every row and every column needs all three colours. Which one is missing at the end?"
    # Riddle Rapids
    pr-rc-fox: "Ferry the fox, the chicken and the corn across — but some can't be left alone!"
    pr-rc-fox-ok: "Everyone made it! The secret: take the chicken first, and bring it BACK when you need to."
    pr-rc-fox-hint: "The fox eats the chicken, and the chicken eats the corn — never leave those pairs alone. Try taking the chicken first!"
    pr-rc-wolf: "Now the wolf, the goat and the cabbage. Same river, same rules!"
    pr-rc-wolf-ok: "Across again! You spotted it — it's the same puzzle wearing a different costume."
    pr-rc-wolf-hint: "Who's the one everyone bothers? The goat! It should ride first — and maybe ride back."
    pr-rc-cat: "One more trip: the cat, the mouse and the cheese!"
    pr-rc-cat-ok: "Champion ferry-captain! Three riddles, one clever trick."
    pr-rc-cat-hint: "The mouse is the troublemaker here — the cat wants it, and it wants the cheese!"
    pr-wj-3: "With a 2-jug and a 5-jug, measure exactly 3!"
    pr-wj-3-ok: "Exactly three! Fill the big jug, pour into the small one — what's left is three."
    pr-wj-3-hint: "Five minus two is three… fill the 5-jug and pour some away into the 2-jug!"
    pr-wj-4: "The famous one: a 3-jug, a 5-jug, and you need exactly 4!"
    pr-wj-4-ok: "Four! That riddle has stumped grown-ups for hundreds of years — not you!"
    pr-wj-4-hint: "Fill the 5, pour into the 3 — that leaves 2. Where could you keep those 2 while you refill?"
    pr-wj-1: "Master level: use the 3-jug and the 5-jug to end with exactly 1!"
    pr-wj-1-ok: "Exactly one! Three plus three is six — one more than the big jug holds. Genius!"
    pr-wj-1-hint: "What happens if you pour a full 3-jug into the 5-jug… twice? The second pour won't all fit!"
    pr-wf-1: "Water is about to pour! Which cup will it fill? Tap your guess!"
    pr-wf-1-ok: "You followed the pipes perfectly — the plug sent all the water the other way!"
    pr-wf-1-hint: "Look for the red plug — water can't get past it. Follow the OPEN pipe with your finger."
    pr-wf-2: "Three cups this time — follow the pipes past the plugs!"
    pr-wf-2-ok: "Right again! The water zig-zagged past both plugs, straight to the middle."
    pr-wf-2-hint: "Start at the funnel and trace down. At every fork, ask: is this pipe plugged?"
    pr-wf-3: "The trickiest pipes yet. Where does the water end up?"
    pr-wf-3-ok: "Incredible! You traced every twist — the water had exactly one way down."
    pr-wf-3-hint: "Two plugs this time. Trace slowly from the top — only one path stays open."
    pr-rp-dog: "Dog goes with bone. What goes with bunny?"
    pr-rp-dog-ok: "A carrot! Dogs love bones, bunnies love carrots — that's the pattern."
    pr-rp-dog-hint: "The bone is the dog's favourite food. What's a bunny's favourite?"
    pr-rp-fish: "Fish goes with the sea. Where does the bird go?"
    pr-rp-fish-ok: "The sky! Fish swim in the sea, birds fly in the sky."
    pr-rp-fish-hint: "The sea is where the fish LIVES. Where do birds spend their day?"
