course:
  formatVersion: 1
  id: space
  title: Space Quest
  subject: Science
  companion: luna
  voice:
    id: jessica
    profile: teaching-slow
  ui:
    done: "Mission complete!"
    backToMap: "Back to the star map"
    score: "You logged {correct} of {total} discoveries!"
  reactions:
    praise: [praise-0, praise-1, praise-2, praise-3]
    oops: [oops-0, oops-1, oops-2]
    solved: [solved-0, solved-1]
  engine: ">=1.0"

  worlds:
    - id: backyard-sky
      title: The Backyard Sky
      emoji: 🌙
      color: "#22D3EE"
      blurb: Earth, the Moon, the Sun, seasons, and gravity.
      stations:
        - { id: moon-phases, title: Moon Phases, icon: 🌗, sub: why the Moon changes shape, board: quiz, bands: [0], lesson: moon-phases, concept: moon-phases }
        - { id: day-night, title: Day & Night, icon: 🌍, sub: why we have day and night, board: quiz, bands: [1], lesson: day-night, concept: day-night-cycle }
        - { id: the-sun, title: Our Star, icon: 🌞, sub: the Sun, our nearest star, board: quiz, bands: [2], lesson: the-sun, concept: our-star }
        - { id: seasons, title: The Seasons, icon: 🍂, sub: why the year changes, board: quiz, bands: [3], lesson: seasons, concept: seasons }
        - { id: gravity, title: Gravity, icon: ⬇️, sub: the pull that holds us down, board: quiz, bands: [4], lesson: gravity, concept: gravity-pulls-down }

    - id: cosmic-neighborhood
      title: Cosmic Neighborhood
      emoji: 🪐
      color: "#A78BFA"
      blurb: The Solar System — planets, moons, rings, and space rocks.
      stations:
        - { id: inner-outer, title: Inner & Outer Planets, icon: 🪨, sub: rocky planets vs gas giants, board: quiz, bands: [5], lesson: inner-outer, concept: inner-vs-outer-planets }
        - { id: gas-giants, title: The Gas Giants, icon: 🪐, sub: the giant outer planets, board: quiz, bands: [6], lesson: gas-giants, concept: gas-giants }
        - { id: moons-rings, title: Moons & Rings, icon: 💍, sub: moons and ring systems, board: quiz, bands: [7], lesson: moons-rings, concept: moons-and-rings }
        - { id: asteroids-comets, title: Asteroids & Comets, icon: ☄️, sub: space rocks and icy visitors, board: quiz, bands: [8], lesson: asteroids-comets, concept: small-bodies }
        - { id: whole-system, title: The Whole System, icon: 📏, sub: order and scale, board: quiz, bands: [9], lesson: whole-system, concept: solar-system-order }

    - id: deep-space
      title: Deep Space
      emoji: 🌌
      color: "#818CF8"
      blurb: Constellations, the lives of stars, nebulae, galaxies, and black holes.
      stations:
        - { id: constellations, title: Constellations, icon: ✨, sub: patterns in the stars, board: quiz, bands: [10], lesson: constellations, concept: constellations }
        - { id: star-life, title: A Star's Life, icon: ⭐, sub: how stars are born and die, board: quiz, bands: [11], lesson: star-life, concept: star-lifecycle }
        - { id: nebulae, title: Nebulae, icon: ☁️, sub: where stars are born, board: quiz, bands: [12], lesson: nebulae, concept: nebulae }
        - { id: galaxies, title: Galaxies, icon: 🌌, sub: islands of billions of stars, board: quiz, bands: [13], lesson: galaxies, concept: galaxies }
        - { id: black-holes, title: Black Holes, icon: 🕳️, sub: gravity so strong light can't escape, board: quiz, bands: [14], lesson: black-holes, concept: black-holes }

    - id: human-element
      title: The Human Element
      emoji: 🛰️
      color: "#2DD4BF"
      blurb: Satellites, the ISS, spacewalks, rockets, and living on Mars.
      stations:
        - { id: life-in-orbit, title: Life in Orbit, icon: 🛰️, sub: living on the ISS, board: quiz, bands: [15], lesson: life-in-orbit, concept: iss-astronauts }
        - { id: getting-there, title: Getting There, icon: 🚀, sub: how we reach space, board: quiz, bands: [16], lesson: getting-there, concept: space-travel-tech }
        - { id: satellites, title: Satellites, icon: 📡, sub: helpers orbiting Earth, board: quiz, bands: [17], lesson: satellites, concept: satellites }
        - { id: spacewalks, title: Spacewalks, icon: 🧑‍🚀, sub: working outside the ship, board: quiz, bands: [18], lesson: spacewalks, concept: spacesuits }
        - { id: mars-base, title: Mars Base, icon: 🔴, sub: living on another world, board: quiz, bands: [19], lesson: mars-base, concept: living-off-earth }

  lessons:
    moon-phases:
      title: Moon Phases
      sections:
        - id: ask
          label: The question
          beats:
            - { say: mp-0, caption: "Why does the Moon seem to change shape each night?", view: { kind: body, key: mp0, body: { role: moon, glow: true }, label: "The Moon" } }
        - id: light
          label: Sunlight
          beats:
            - { say: mp-1, caption: "The Moon makes no light of its own — it shines by reflecting sunlight.", view: { kind: moonPhase, key: mp1, interactive: false } }
        - id: half
          label: Half lit
          beats:
            - { say: mp-2, caption: "The Sun always lights one half of the Moon — the half facing the Sun.", view: { kind: moonPhase, key: mp2, interactive: false } }
            - { say: mp-3, caption: "As the Moon orbits Earth, we see more or less of that sunlit half — that's a phase.", view: { kind: moonPhase, key: mp3, interactive: false } }
        - id: cycle
          label: The cycle
          beats:
            - { say: mp-4, caption: "The phases cycle about every 29 days — from new moon to full moon and back.", advance: hold, view: { kind: moonPhase, key: mp4, variant: strip, says: { new: mp-x-new, waxingCrescent: mp-x-waxing-crescent, first: mp-x-first, waxingGibbous: mp-x-waxing-gibbous, full: mp-x-full, waningGibbous: mp-x-waning-gibbous, last: mp-x-last, waningCrescent: mp-x-waning-crescent } } }
        - id: explore
          label: Explore
          beats:
            - { say: mp-5, caption: "Drag to move the Moon around Earth and watch its phase change!", advance: hold, view: { kind: moonPhase, key: mp-explore, interactive: true, says: { new: mp-x-new, waxingCrescent: mp-x-waxing-crescent, first: mp-x-first, waxingGibbous: mp-x-waxing-gibbous, full: mp-x-full, waningGibbous: mp-x-waning-gibbous, last: mp-x-last, waningCrescent: mp-x-waning-crescent } } }
    day-night:
      title: Day & Night
      sections:
        - id: ask
          label: The question
          beats:
            - { say: dn-0, caption: "Have you ever wondered why it gets dark at night?", view: { kind: body, key: dn0, body: { role: planet, glow: true }, label: "Earth" } }
        - id: spin
          label: Earth spins
          beats:
            - { say: dn-1, caption: "Earth spins like a top — one full spin takes about 24 hours.", view: { kind: orbit, key: dn1, bodies: [ { id: sun, role: star }, { id: earth, role: planet, orbits: sun, radius: 70, period: 10 } ] } }
        - id: sides
          label: Day and night
          beats:
            - { say: dn-2, caption: "The side facing the Sun has daytime; the side facing away has night.", view: { kind: orbit, key: dn2, bodies: [ { id: sun, role: star }, { id: earth, role: planet, orbits: sun, radius: 70, period: 10 } ] } }
            - { say: dn-3, caption: "It's Earth's spinning — not the Sun moving — that gives us day and night.", view: { kind: body, key: dn3, body: { role: planet, glow: true } } }
            - { say: dn-4, caption: "One full spin equals one day — you get sunshine and darkness every 24 hours.", view: { kind: body, key: dn4, body: { role: planet } } }
        - id: explore
          label: Explore
          beats:
            - { say: dn-5, caption: "Drag to spin Earth through a full day!", advance: hold, view: { kind: scrub, key: dn-explore, base: { kind: orbit, bodies: [ { id: sun, role: star }, { id: earth, role: planet, orbits: sun, radius: 70 } ] }, states: [ { id: dawn, label: Dawn, say: dn-x-dawn, caption: "Dawn — the Sun peeks over the horizon as Earth turns toward it." }, { id: noon, label: Noon, say: dn-x-noon, caption: "Noon — your part of Earth faces the Sun directly." }, { id: dusk, label: Dusk, say: dn-x-dusk, caption: "Dusk — Earth turns away and the Sun sinks toward the horizon." }, { id: night, label: Night, say: dn-x-night, caption: "Night — your side of Earth faces away from the Sun." } ] } }
    the-sun:
      title: Our Star
      sections:
        - id: ask
          label: The question
          beats:
            - { say: su-0, caption: "Look up on a clear day — what is that brilliant ball of light?", view: { kind: body, key: su0, body: { role: star, glow: true }, label: "The Sun" } }
        - id: what
          label: What it is
          beats:
            - { say: su-1, caption: "The Sun is a star — the closest one to Earth.", view: { kind: body, key: su1, body: { role: star, glow: true } } }
            - { say: su-2, caption: "It's a giant ball of super-hot, glowing gas.", view: { kind: body, key: su2, body: { role: star, glow: true } } }
        - id: size
          label: How big
          beats:
            - { say: su-3, caption: "The Sun is so large that over a million Earths could fit inside.", view: { kind: compare, key: su3, items: [ { label: "Sun", relSize: 10 }, { label: "Earth", relSize: 1 } ] } }
        - id: life
          label: Why it matters
          beats:
            - { say: su-4, caption: "The Sun gives Earth almost all of its light and heat — without it, life couldn't exist.", view: { kind: body, key: su4, body: { role: star, glow: true } } }
        - id: explore
          label: Explore
          beats:
            - { say: su-5, caption: "Tap each part of the Sun to explore what's inside!", advance: hold, view: { kind: reveal, key: su-explore, base: { kind: body, body: { role: star, glow: true } }, hotspots: [ { id: core, label: "Core", say: su-x-core, caption: "The core is the engine — energy made here takes thousands of years to reach the surface.", x: 50, y: 50 }, { id: surface, label: "Surface", say: su-x-surface, caption: "The surface blazes at about 5,500 degrees Celsius.", x: 80, y: 30 }, { id: rays, label: "Sunlight", say: su-x-rays, caption: "Light and heat pour out and travel 8 minutes to reach Earth.", x: 15, y: 15 } ] } }
    seasons:
      title: The Seasons
      sections:
        - id: ask
          label: The question
          beats:
            - { say: se-0, caption: "Why is summer hot and winter cold, even though Earth stays the same distance from the Sun?", view: { kind: orbit, key: se0, bodies: [ { id: sun, role: star }, { id: earth, role: planet, orbits: sun, radius: 70, period: 10 } ] } }
        - id: tilt
          label: Earth's tilt
          beats:
            - { say: se-1, caption: "Earth is tilted as it circles the Sun — not straight up, but at an angle.", view: { kind: body, key: se1, body: { role: planet, tilt: true } } }
            - { say: se-2, caption: "When your half of Earth tilts toward the Sun, sunlight hits more directly — that's summer.", view: { kind: body, key: se2, body: { role: planet, tilt: true } } }
        - id: seasons
          label: Seasons
          beats:
            - { say: se-3, caption: "When your half tilts away, sunlight spreads out and feels weaker — that's winter.", view: { kind: orbit, key: se3, bodies: [ { id: sun, role: star }, { id: earth, role: planet, orbits: sun, radius: 70, period: 10 } ] } }
            - { say: se-4, caption: "Seasons are caused by Earth's tilt, not by how close we are to the Sun.", view: { kind: fact, key: se4, emoji: "🌍", text: "Seasons are caused by Earth's tilt, not by how close we are to the Sun." } }
        - id: explore
          label: Explore
          beats:
            - { say: se-5, caption: "Drag Earth around its orbit to walk through the four seasons!", advance: hold, view: { kind: scrub, key: se-explore, base: { kind: orbit, bodies: [ { id: sun, role: star }, { id: earth, role: planet, orbits: sun, radius: 70 } ] }, states: [ { id: spring, label: Spring, say: se-x-spring, caption: "Spring — neither hemisphere tilts much toward the Sun; days grow longer." }, { id: summer, label: Summer, say: se-x-summer, caption: "Summer — your hemisphere tilts toward the Sun; long days and strong sunlight." }, { id: autumn, label: Autumn, say: se-x-autumn, caption: "Autumn — your hemisphere tilts away again; days shorten and cool." }, { id: winter, label: Winter, say: se-x-winter, caption: "Winter — your hemisphere tilts away the most; short days and weak sunlight." } ] } }
    gravity:
      title: Gravity
      sections:
        - id: ask
          label: The question
          beats:
            - { say: gr-0, caption: "Drop anything and it falls — why does everything always pull toward the ground?", view: { kind: body, key: gr0, body: { role: planet, glow: true }, label: "Earth" } }
        - id: pull
          label: The pull
          beats:
            - { say: gr-1, caption: "Gravity is a pull. Everything with mass pulls on everything else.", view: { kind: body, key: gr1, body: { role: planet } } }
            - { say: gr-2, caption: "Earth's gravity pulls things toward its center — that's why things fall down.", view: { kind: body, key: gr2, body: { role: planet, glow: true } } }
        - id: mass
          label: Mass matters
          beats:
            - { say: gr-3, caption: "The more mass something has, the stronger its gravity pull.", view: { kind: compare, key: gr3, items: [ { label: "Earth", relSize: 4 }, { label: "Moon", relSize: 1 } ] } }
            - { say: gr-4, caption: "Gravity holds you to the ground, keeps the Moon in orbit, and holds Earth near the Sun.", view: { kind: orbit, key: gr4, bodies: [ { id: earth, role: planet }, { id: moon, role: moon, orbits: earth, radius: 64, period: 6 } ] } }
        - id: explore
          label: Explore
          beats:
            - { say: gr-5, caption: "Tap each world to feel its gravity!", advance: hold, view: { kind: reveal, key: gr-explore, base: { kind: compare, items: [ { label: "Jupiter", relSize: 11 }, { label: "Earth", relSize: 4 }, { label: "Moon", relSize: 1 } ] }, hotspots: [ { id: jupiter, label: "Jupiter", say: gr-x-jupiter, caption: "Jupiter is enormous — its gravity is 2.5 times stronger than Earth's.", x: 15, y: 50 }, { id: earth, label: "Earth", say: gr-x-earth, caption: "Earth's gravity feels normal to you — it's what you were born with!", x: 50, y: 50 }, { id: moon, label: "Moon", say: gr-x-moon, caption: "The Moon is small — its gravity is about one-sixth of Earth's.", x: 80, y: 50 } ] } }
    inner-outer:
      title: Inner & Outer Planets
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: io-0, caption: "Our Solar System has 8 planets, all circling the Sun.", advance: hold, view: { kind: fact, key: io0, emoji: ☀️, text: "Our Solar System has 8 planets, all circling the Sun." } }
            - { say: io-1, caption: "The 4 inner planets — Mercury, Venus, Earth, Mars — are small and rocky.", advance: hold, view: { kind: fact, key: io1, emoji: 🪨, text: "The 4 inner planets — Mercury, Venus, Earth, Mars — are small and rocky." } }
            - { say: io-2, caption: "The 4 outer planets are huge balls of gas and ice, much farther out.", advance: hold, view: { kind: fact, key: io2, emoji: 🎈, text: "The 4 outer planets are huge balls of gas and ice, much farther out." } }
    gas-giants:
      title: The Gas Giants
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: gg-0, caption: "Jupiter is the biggest planet — over 1,000 Earths could fit inside!", advance: hold, view: { kind: fact, key: gg0, emoji: 🪐, text: "Jupiter is the biggest planet — over 1,000 Earths could fit inside!" } }
            - { say: gg-1, caption: "Saturn is famous for its bright rings, made of ice and rock.", advance: hold, view: { kind: fact, key: gg1, emoji: 💍, text: "Saturn is famous for its bright rings, made of ice and rock." } }
            - { say: gg-2, caption: "Uranus and Neptune are icy giants, way out in the cold.", advance: hold, view: { kind: fact, key: gg2, emoji: ❄️, text: "Uranus and Neptune are icy giants, way out in the cold." } }
    moons-rings:
      title: Moons & Rings
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: mr-0, caption: "Many planets have moons — Jupiter has dozens of them!", advance: hold, view: { kind: fact, key: mr0, emoji: 🌝, text: "Many planets have moons — Jupiter has dozens of them!" } }
            - { say: mr-1, caption: "Saturn's rings are made of billions of icy chunks.", advance: hold, view: { kind: fact, key: mr1, emoji: 💍, text: "Saturn's rings are made of billions of icy chunks." } }
            - { say: mr-2, caption: "Earth has just one moon, but some planets have many.", advance: hold, view: { kind: fact, key: mr2, emoji: 🌚, text: "Earth has just one moon, but some planets have many." } }
    asteroids-comets:
      title: Asteroids & Comets
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: ac-0, caption: "A comet is an icy ball that grows a glowing tail near the Sun.", advance: hold, view: { kind: fact, key: ac0, emoji: ☄️, text: "A comet is an icy ball that grows a glowing tail near the Sun." } }
            - { say: ac-1, caption: "Asteroids are rocky leftovers from when the planets formed.", advance: hold, view: { kind: fact, key: ac1, emoji: 🪨, text: "Asteroids are rocky leftovers from when the planets formed." } }
            - { say: ac-2, caption: "Most asteroids orbit in a belt between Mars and Jupiter.", advance: hold, view: { kind: fact, key: ac2, emoji: 🌌, text: "Most asteroids orbit in a belt between Mars and Jupiter." } }
    whole-system:
      title: The Whole System
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: ws-0, caption: "Space is huge — the outer planets are billions of kilometers from the Sun.", advance: hold, view: { kind: fact, key: ws0, emoji: 📏, text: "Space is huge — the outer planets are billions of kilometers from the Sun." } }
            - { say: ws-1, caption: "Mercury is closest to the Sun; Neptune is the farthest of the 8 planets.", advance: hold, view: { kind: fact, key: ws1, emoji: 🥇, text: "Mercury is closest to the Sun; Neptune is the farthest of the 8 planets." } }
            - { say: ws-2, caption: "Planets near the Sun are hot; far-away planets are freezing cold.", advance: hold, view: { kind: fact, key: ws2, emoji: 🌡️, text: "Planets near the Sun are hot; far-away planets are freezing cold." } }
    constellations:
      title: Constellations
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: cn-0, caption: "A constellation is a pattern of stars that people imagined into pictures.", advance: hold, view: { kind: fact, key: cn0, emoji: ✨, text: "A constellation is a pattern of stars that people imagined into pictures." } }
            - { say: cn-1, caption: "Sailors and explorers used constellations to find their way at night.", advance: hold, view: { kind: fact, key: cn1, emoji: 🧭, text: "Sailors and explorers used constellations to find their way at night." } }
            - { say: cn-2, caption: "As Earth orbits the Sun, different constellations appear with the seasons.", advance: hold, view: { kind: fact, key: cn2, emoji: 🌍, text: "As Earth orbits the Sun, different constellations appear with the seasons." } }
    star-life:
      title: A Star's Life
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: sl-0, caption: "Stars are born inside giant clouds of gas and dust called nebulae.", advance: hold, view: { kind: fact, key: sl0, emoji: ☁️, text: "Stars are born inside giant clouds of gas and dust called nebulae." } }
            - { say: sl-1, caption: "A star shines for millions or billions of years by burning fuel in its core.", advance: hold, view: { kind: fact, key: sl1, emoji: ⭐, text: "A star shines for millions or billions of years by burning fuel in its core." } }
            - { say: sl-2, caption: "When a giant star runs out of fuel, it can explode in a supernova.", advance: hold, view: { kind: fact, key: sl2, emoji: 💥, text: "When a giant star runs out of fuel, it can explode in a supernova." } }
    nebulae:
      title: Nebulae
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: ne-0, caption: "A nebula is a giant cloud of gas and dust floating in space.", advance: hold, view: { kind: fact, key: ne0, emoji: ☁️, text: "A nebula is a giant cloud of gas and dust floating in space." } }
            - { say: ne-1, caption: "New stars are born deep inside nebulae.", advance: hold, view: { kind: fact, key: ne1, emoji: ⭐, text: "New stars are born deep inside nebulae." } }
            - { say: ne-2, caption: "Nebulae glow in beautiful colors — pink, teal, and violet.", advance: hold, view: { kind: fact, key: ne2, emoji: 🎨, text: "Nebulae glow in beautiful colors — pink, teal, and violet." } }
    galaxies:
      title: Galaxies
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: ga-0, caption: "A galaxy is a huge family of billions of stars.", advance: hold, view: { kind: fact, key: ga0, emoji: 🌌, text: "A galaxy is a huge family of billions of stars." } }
            - { say: ga-1, caption: "We live in the Milky Way galaxy.", advance: hold, view: { kind: fact, key: ga1, emoji: 🏠, text: "We live in the Milky Way galaxy." } }
            - { say: ga-2, caption: "There are billions of galaxies scattered across the universe.", advance: hold, view: { kind: fact, key: ga2, emoji: 🔭, text: "There are billions of galaxies scattered across the universe." } }
    black-holes:
      title: Black Holes
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: bh-0, caption: "A black hole has gravity so strong that not even light can escape it.", advance: hold, view: { kind: fact, key: bh0, emoji: 🕳️, text: "A black hole has gravity so strong that not even light can escape it." } }
            - { say: bh-1, caption: "Many black holes form when a giant star collapses at the end of its life.", advance: hold, view: { kind: fact, key: bh1, emoji: 🌟, text: "Many black holes form when a giant star collapses at the end of its life." } }
            - { say: bh-2, caption: "We can't see black holes directly — we spot them by how they pull on nearby stars.", advance: hold, view: { kind: fact, key: bh2, emoji: 🔭, text: "We can't see black holes directly — we spot them by how they pull on nearby stars." } }
    life-in-orbit:
      title: Life in Orbit
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: lo-0, caption: "The International Space Station orbits Earth about every 90 minutes.", advance: hold, view: { kind: fact, key: lo0, emoji: 🛰️, text: "The International Space Station orbits Earth about every 90 minutes." } }
            - { say: lo-1, caption: "Astronauts float because they're in constant free-fall around Earth.", advance: hold, view: { kind: fact, key: lo1, emoji: 🧑‍🚀, text: "Astronauts float because they're in constant free-fall around Earth." } }
            - { say: lo-2, caption: "Crews run science experiments you can't do on the ground.", advance: hold, view: { kind: fact, key: lo2, emoji: 🔬, text: "Crews run science experiments you can't do on the ground." } }
    getting-there:
      title: Getting There
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: gt-0, caption: "Rockets push hot gas down hard, and that thrust pushes them up into space.", advance: hold, view: { kind: fact, key: gt0, emoji: 🚀, text: "Rockets push hot gas down hard, and that thrust pushes them up into space." } }
            - { say: gt-1, caption: "Reaching orbit takes enormous speed — about 28,000 km/h!", advance: hold, view: { kind: fact, key: gt1, emoji: ⛽, text: "Reaching orbit takes enormous speed — about 28,000 km/h!" } }
            - { say: gt-2, caption: "Many rockets now land back on Earth so they can be flown again.", advance: hold, view: { kind: fact, key: gt2, emoji: 🪂, text: "Many rockets now land back on Earth so they can be flown again." } }
    satellites:
      title: Satellites
      sections:
        - id: learn
          label: Learn it
          beats:
            - { say: sa-0, caption: "Satellites are machines that circle Earth doing helpful jobs.", advance: hold, view: { kind: fact, key: sa0, emoji: 🛰️, text: "Satellites are machines that circle Earth doing helpful jobs." } }
            - { say: sa-1, caption: "They help with TV, phones, maps, and weather forecasts.", advance: hold, view: { kind: fact, key: sa1, emoji: 📡, text: "They help with TV, phones, maps, and weather forecasts." } }
