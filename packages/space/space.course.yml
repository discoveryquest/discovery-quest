          beats:
            - { say: sl-3, caption: "A star shines for millions or billions of years by making energy in its core.", view: { kind: body, key: sl3, body: { role: star, glow: true }, label: "Core energy" } }
            - { say: sl-4, caption: "When a massive star runs out of fuel, it can swell up and explode in a supernova.", view: { kind: launch, key: sl4, payload: "💥" } }
        - id: explore
          label: Explore
          beats:
            - { say: sl-5, caption: "Drag through the stages of a massive star's life!", advance: hold, view: { kind: scrub, key: sl-explore, base: { kind: starLife }, states: [ { id: nebula, label: Nebula, say: sl-x-nebula, caption: "Nebula — gas and dust gather in a glowing star nursery." }, { id: newborn, label: New star, say: sl-x-newborn, caption: "New star — gravity makes the center hot enough to shine." }, { id: giant, label: Red giant, say: sl-x-giant, caption: "Red giant — the star swells as its fuel changes." }, { id: supernova, label: Supernova, say: sl-x-supernova, caption: "Supernova — a massive star can explode and scatter new ingredients into space." } ] } }
    nebulae:
