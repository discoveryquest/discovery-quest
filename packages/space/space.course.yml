            - { say: ac-4, caption: "Asteroids are mostly rock; comets are more like dusty snowballs from the cold outer Solar System.", view: { kind: compare, key: ac4, items: [ { label: "Asteroid rock", relSize: 0.62, role: moon, color: asteroid }, { label: "Comet ice", relSize: 0.62, role: moon, color: comet } ] } }
