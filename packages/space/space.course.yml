          beats:
            - { say: sw-5, caption: "Tap the spacesuit parts that keep an astronaut safe!", advance: hold, view: { kind: reveal, key: sw-explore, base: { kind: field, tint: deep-space, density: high, label: "Spacesuit checklist" }, hotspots: [ { id: air, label: "Air", emoji: "🫁", say: sw-x-air, caption: "The backpack supplies oxygen so the astronaut can breathe.", x: 35, y: 42 }, { id: cooling, label: "Cooling", emoji: "❄️", say: sw-x-cooling, caption: "Cooling loops carry heat away from the astronaut's body.", x: 58, y: 38 }, { id: tether, label: "Tether", emoji: "🪢", say: sw-x-tether, caption: "A tether keeps the astronaut attached to the spacecraft.", x: 70, y: 64 } ] } }
