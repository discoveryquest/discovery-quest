            - { say: sa-4, caption: "Weather satellites can watch giant storms from high above Earth before they reach people.", view: { kind: body, key: sa4, body: { role: planet, color: earth, glow: true }, label: "Storm watch from orbit" } }
        - id: explore
          label: Explore
          beats:
            - { say: sa-5, caption: "Tap each satellite signal to match it with a helpful job!", advance: hold, view: { kind: reveal, key: sa-explore, base: { kind: orbit, bodies: [ { id: earth, role: planet, color: earth }, { id: satellite, role: moon, color: "#dbeafe", orbits: earth, radius: 86, period: 6 } ] }, hotspots: [ { id: gps, label: "GPS", emoji: "📍", say: sa-x-gps, caption: "GPS satellites help phones and cars find their location.", x: 35, y: 40 }, { id: comms, label: "Comms", emoji: "📡", say: sa-x-comms, caption: "Communication satellites relay messages, broadcasts, and internet data.", x: 62, y: 44 }, { id: storm, label: "Weather", emoji: "⛈️", say: sa-x-storm, caption: "Weather satellites track storms and cloud patterns from space.", x: 72, y: 66 } ] } }
