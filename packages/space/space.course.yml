            - { say: gt-3, caption: "Rocket stages drop away when their fuel is used, making the remaining spacecraft lighter.", view: { kind: launch, key: gt3, payload: "🚀" } }
            - { say: gt-4, caption: "Many modern rockets can land back on Earth so parts can be flown again.", view: { kind: launch, key: gt4, payload: "♻️" } }
