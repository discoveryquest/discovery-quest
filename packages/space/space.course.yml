    constellations:
      title: Constellations
      sections:
        - id: ask
          label: The question
          beats:
            - { say: cn-0, caption: "Why do star patterns seem to make pictures in the night sky?", view: { kind: field, key: cn0, tint: deep-space, density: high, label: "Pictures in the stars" } }
