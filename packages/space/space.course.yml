  narration:
    mp-0: "Why does the Moon seem to change shape each night?"
    mp-1: "The Moon makes no light of its own — it shines by reflecting sunlight, and the Sun always lights the half facing it."
    mp-3: "As the Moon orbits Earth, we see more or less of that sunlit half — and that's a phase. One full cycle takes about 29 days."
    mp-5: "Drag to move the Moon around Earth and watch its phase change!"
    mp-x-new: "New Moon — the Moon sits between Earth and the Sun, so the side facing us is dark."
    mp-x-waxing-crescent: "Waxing Crescent — a thin sliver of the lit side appears, and it's growing."
    mp-x-first: "First Quarter — we see half of the Moon's lit side."
    mp-x-waxing-gibbous: "Waxing Gibbous — most of the lit side shows now, and it's still growing."
    mp-x-full: "Full Moon — the Moon is opposite the Sun, so we see its whole lit face."
    mp-x-waning-gibbous: "Waning Gibbous — most of the lit side still shows, but now it's shrinking."
    mp-x-last: "Last Quarter — we see the other half of the lit side."
    mp-x-waning-crescent: "Waning Crescent — only a thin sliver of light is left before the next new moon."
    pr-mp-full: "Move the Moon to make a Full Moon."
    pr-mp-full-ok: "Yes — the Moon is opposite the Sun, so we see its whole lit face."
    pr-mp-full-hint: "Try the far side of Earth, away from the Sun."
    pr-mp-first: "Move the Moon to make a First Quarter Moon."
    pr-mp-first-ok: "Great — First Quarter shows half of the Moon's lit side."
    pr-mp-first-hint: "Try placing the Moon a quarter of the way around from New Moon."
    pr-mp-waning-crescent: "Move the Moon to make a Waning Crescent."
    pr-mp-waning-crescent-ok: "Yes — only a thin sliver is lit, and it is shrinking toward New Moon."
    pr-mp-waning-crescent-hint: "Try the last small sliver before the Moon returns to New Moon."
    pr-dn-noon: "Spin Earth until your town has noon."
    pr-dn-noon-ok: "Yes — at noon, your part of Earth faces the Sun directly."
    pr-dn-noon-hint: "Look for the moment when your side is turned toward the Sun."
    pr-dn-night: "Spin Earth until your town has night."
    pr-dn-night-ok: "Correct — night happens when your side faces away from the Sun."
    pr-dn-night-hint: "Turn Earth until your side is on the dark half."
    pr-su-core: "Tap the part of the Sun where energy is made."
    pr-su-core-ok: "Yes — the core is the Sun's energy engine."
    pr-su-core-hint: "The core is deep in the middle of the Sun."
    pr-su-rays: "Tap the rays that carry light and heat to Earth."
    pr-su-rays-ok: "Right — sunlight and heat travel outward as rays."
    pr-su-rays-hint: "Look for the glowing lines leaving the Sun."
    pr-se-summer: "Move Earth to summer for the northern half."
    pr-se-summer-ok: "Yes — the northern half tilts toward the Sun in summer."
    pr-se-summer-hint: "Try the place where the northern half leans toward the Sun."
    pr-se-winter: "Move Earth to winter for the northern half."
    pr-se-winter-ok: "Correct — winter happens when the northern half tilts away from the Sun."
    pr-se-winter-hint: "Try the place where the northern half leans away from the Sun."
    pr-gr-strongest: "Tap the world with the strongest gravity."
    pr-gr-strongest-ok: "Yes — huge Jupiter has the strongest gravity of these three."
    pr-gr-strongest-hint: "The more mass a world has, the stronger its gravity pull."
    pr-gr-earth: "Tap the world whose gravity feels normal to us."
    pr-gr-earth-ok: "Right — Earth's gravity is what feels normal to people on Earth."
    pr-gr-earth-hint: "Choose our home planet."
    pr-io-sort: "Sort each planet into inner rocky worlds or outer giants."
    pr-io-sort-ok: "Yes — the inner planets are rocky, and Jupiter and Neptune are outer giants."
    pr-io-sort-hint: "Small solid worlds go inside; huge gas and ice worlds go outside."
    pr-io-rocky-giant: "Put the rocky planets on one side and the giant planets on the other."
    pr-io-rocky-giant-ok: "Correct — Venus and Mars are rocky, while Saturn and Uranus are giants."
    pr-io-rocky-giant-hint: "Rocky planets have solid surfaces; giant planets are much larger."
    pr-gg-biggest: "Tap the biggest planet."
    pr-gg-biggest-ok: "Yes — Jupiter is the biggest planet in our Solar System."
    pr-gg-biggest-hint: "Look for the largest giant."
    pr-gg-rings: "Tap Saturn's rings."
    pr-gg-rings-ok: "Right — Saturn's bright rings are made of ice and rock."
    pr-gg-rings-hint: "Look for the wide hoop around Saturn."
    pr-mr-sort: "Sort moons and ring pieces into the right orbit groups."
    pr-mr-sort-ok: "Yes — moons are larger worlds, while rings are made of many small pieces."
    pr-mr-sort-hint: "One big object is a moon; many tiny chunks make a ring."
    pr-mr-gravity: "Tap what keeps moons and ring pieces looping around a planet."
    pr-mr-gravity-ok: "Correct — gravity keeps them orbiting again and again."
    pr-mr-gravity-hint: "It is the same pull that makes things fall down."
    pr-ac-sort: "Sort each small body as rocky asteroid or icy comet."
    pr-ac-sort-ok: "Yes — asteroids are rocky, and comets are icy dusty bodies."
    pr-ac-sort-hint: "Rock goes with asteroids; ice and tails go with comets."
    pr-ac-belt: "Tap where most asteroids travel."
    pr-ac-belt-ok: "Right — most asteroids travel in the belt between Mars and Jupiter."
    pr-ac-belt-hint: "Look for the rocky zone between the inner planets and Jupiter."
    pr-ws-order: "Arrange the planets from closest to farthest from the Sun."
    pr-ws-order-ok: "Yes — that is the planet order from Mercury out to Neptune."
    pr-ws-order-hint: "Start with Mercury and end with Neptune."
    pr-ws-inner-outer: "Arrange this mini Solar System from inside to outside."
    pr-ws-inner-outer-ok: "Correct — Mercury is inside, then Earth, then Jupiter, then Neptune."
    pr-ws-inner-outer-hint: "Rocky worlds come before the far outer giants."
    pr-cn-connect: "Connect the stars to make a constellation pattern."
    pr-cn-connect-ok: "Yes — connecting the bright points makes a remembered star pattern."
    pr-cn-connect-hint: "Start with the lower-left star, then follow the bent line upward."
    pr-cn-guide: "Tap the sky clue travelers used to find their way."
    pr-cn-guide-ok: "Correct — familiar star patterns helped travelers keep direction at night."
    pr-cn-guide-hint: "Look for the clue that acts like a compass."
    pr-sl-order: "Arrange the life of a massive star from birth to explosion."
    pr-sl-order-ok: "Yes — cloud, new star, giant star, then supernova."
    pr-sl-order-hint: "Stars begin in nebulae and massive ones can end with a supernova."
    pr-sl-birth: "Tap where stars are born."
    pr-sl-birth-ok: "Right — stars are born in nebulae, giant clouds of gas and dust."
    pr-sl-birth-hint: "Choose the cloudy star nursery."
    pr-ne-stars: "Tap the place where new stars can begin inside a nebula."
    pr-ne-stars-ok: "Yes — gravity can gather material until new stars begin."
    pr-ne-stars-hint: "Look for the tiny stars forming inside the cloud."
    pr-ne-sort: "Sort what belongs inside a nebula."
    pr-ne-sort-ok: "Correct — gas, dust, and forming stars belong in a nebula."
    pr-ne-sort-hint: "A nebula is a cloud, not a spacecraft."
    pr-ga-home: "Tap our home galaxy."
    pr-ga-home-ok: "Yes — the Milky Way is our home galaxy."
    pr-ga-home-hint: "Our home galaxy has a milky band of stars."
    pr-ga-scale: "Sort the space objects from small family to huge family."
    pr-ga-scale-ok: "Correct — a galaxy is a huge family of billions of stars."
    pr-ga-scale-hint: "Single stars go together; galaxies are giant star families."
    pr-bh-light: "Tap the clue that shows black holes can bend light."
    pr-bh-light-ok: "Yes — strong gravity can bend light around a black hole."
    pr-bh-light-hint: "Look for the wavy bent-light clue."
    pr-bh-tug: "Tap the clue that reveals something invisible tugging on a star."
    pr-bh-tug-ok: "Correct — a star orbiting something invisible can reveal a black hole."
    pr-bh-tug-hint: "Look for the star being pulled by gravity."
    pr-lo-freefall: "Tap why astronauts float on the space station."
    pr-lo-freefall-ok: "Correct — astronauts float because they and the station are falling around Earth together."
    pr-lo-freefall-hint: "They are still near Earth's gravity, but they are in continuous free-fall."
    pr-lo-day: "Sort ISS activities into body care or science work."
    pr-lo-day-ok: "Yes — crews care for their bodies and run science experiments in orbit."
    pr-lo-day-hint: "Exercise and sleep help the body; experiments and plant studies are science."
    pr-gt-sequence: "Arrange the rocket trip from launch pad to orbit."
    pr-gt-sequence-ok: "Yes — thrust lifts off, stages drop, orbit begins, and reusable parts can land."
    pr-gt-sequence-hint: "Start with engine thrust and end with landing for reuse."
    pr-gt-thrust: "Tap what pushes a rocket upward."
    pr-gt-thrust-ok: "Right — thrust from hot gas pushes the rocket upward."
    pr-gt-thrust-hint: "Look for the fiery engine push."
    pr-sa-jobs: "Match each satellite helper to its job."
    pr-sa-jobs-ok: "Correct — GPS helps navigation, while weather satellites watch clouds and storms."
    pr-sa-jobs-hint: "Maps and GPS find places; clouds and storms belong to weather."
    pr-sa-orbit: "Tap where satellites travel."
    pr-sa-orbit-ok: "Yes — satellites travel in orbits around Earth."
    pr-sa-orbit-hint: "Choose the path circling Earth."
    pr-sw-air: "Tap the spacesuit system that helps astronauts breathe."
    pr-sw-air-ok: "Correct — the suit backpack supplies oxygen for breathing."
    pr-sw-air-hint: "Look for the breathing clue."
    pr-sw-tether: "Tap what keeps a spacewalker attached to the spacecraft."
    pr-sw-tether-ok: "Yes — a tether keeps the astronaut connected."
    pr-sw-tether-hint: "Look for the safety line."
    pr-mb-supplies: "Sort what a Mars base must make or bring."
    pr-mb-supplies-ok: "Yes — air, water, and food are survival systems for a Mars base."
    pr-mb-supplies-hint: "A Mars base needs life support, not just travel gear."
    pr-mb-power: "Tap the system that could run heaters, labs, and life support."
    pr-mb-power-ok: "Correct — power keeps a Mars base running."
    pr-mb-power-hint: "Look for the energy symbol."
    dn-0: "Have you ever wondered why it gets dark at night?"
    dn-1: "Earth spins like a top — one full spin takes about 24 hours."
    dn-2: "The side facing the Sun has daytime; the side facing away has night."
    dn-3: "It's Earth's spinning — not the Sun moving — that gives us day and night."
    dn-4: "One full spin equals one day — you get sunshine and darkness every 24 hours."
    dn-5: "Drag to spin Earth through a full day!"
    dn-x-dawn: "Dawn — the Sun peeks over the horizon as Earth turns toward it."
    dn-x-noon: "Noon — your part of Earth faces the Sun directly."
    dn-x-dusk: "Dusk — Earth turns away and the Sun sinks toward the horizon."
    dn-x-night: "Night — your side of Earth faces away from the Sun."
    su-0: "Look up on a clear day — what is that brilliant ball of light?"
    su-1: "The Sun is a star — the closest one to Earth."
    su-2: "It's a giant ball of super-hot, glowing gas."
    su-3: "The Sun is so large that over a million Earths could fit inside."
    su-4: "The Sun gives Earth almost all of its light and heat — without it, life couldn't exist."
    su-5: "Tap each part of the Sun to explore what's inside!"
    su-x-core: "The core is the engine — energy made here takes thousands of years to reach the surface."
    su-x-surface: "The surface blazes at about 5,500 degrees Celsius."
    su-x-rays: "Light and heat pour out and travel 8 minutes to reach Earth."
    se-0: "Why is summer hot and winter cold, even though Earth stays the same distance from the Sun?"
    se-1: "Earth is tilted as it circles the Sun — not straight up, but at an angle."
    se-2: "When your half of Earth tilts toward the Sun, sunlight hits more directly — that's summer."
    se-3: "When your half tilts away, sunlight spreads out and feels weaker — that's winter."
    se-4: "Seasons are caused by Earth's tilt, not by how close we are to the Sun."
    se-5: "Drag Earth around its orbit to walk through the four seasons!"
    se-x-spring: "Spring — neither hemisphere tilts much toward the Sun; days grow longer."
    se-x-summer: "Summer — your hemisphere tilts toward the Sun; long days and strong sunlight."
    se-x-autumn: "Autumn — your hemisphere tilts away again; days shorten and cool."
    se-x-winter: "Winter — your hemisphere tilts away the most; short days and weak sunlight."
    gr-0: "Drop anything and it falls — why does everything always pull toward the ground?"
    gr-1: "Gravity is a pull. Everything with mass pulls on everything else."
    gr-2: "Earth's gravity pulls things toward its center — that's why things fall down."
    gr-3: "The more mass something has, the stronger its gravity pull."
    gr-4: "Gravity holds you to the ground, keeps the Moon in orbit, and holds Earth near the Sun."
    gr-5: "Tap each world to feel its gravity!"
    gr-x-jupiter: "Jupiter is enormous — its gravity is 2.5 times stronger than Earth's."
    gr-x-earth: "Earth's gravity feels normal to you — it's what you were born with!"
    gr-x-moon: "The Moon is small — its gravity is about one-sixth of Earth's."
    io-0: "Why do the planets near the Sun feel so different from the planets far away?"
    io-1: "The four inner planets — Mercury, Venus, Earth, and Mars — are small, solid, rocky worlds."
    io-2: "They orbit close to the Sun, where it is warmer and rocky material could clump together."
    io-3: "The outer planets — Jupiter, Saturn, Uranus, and Neptune — are much larger gas and ice giants."
    io-4: "The farther you travel from the Sun, the colder and wider the Solar System becomes."
    io-5: "Tap planets to sort the inner rocky worlds from the outer giants!"
    io-x-mercury: "Mercury is an inner planet — small, rocky, and closest to the Sun."
    io-x-earth: "Earth is an inner rocky planet with a solid surface."
    io-x-jupiter: "Jupiter is an outer gas giant, far larger than Earth."
    io-x-neptune: "Neptune is an outer ice giant, deep in the cold Solar System."
    gg-0: "What makes the outer planets so enormous compared with Earth?"
    gg-1: "Jupiter is the biggest planet — more than one thousand Earths could fit inside it."
    gg-2: "It has no solid ground like Earth; it is mostly hydrogen and helium gas wrapped around a deep interior."
    gg-3: "Saturn is famous for bright rings made of countless icy and rocky pieces."
    gg-4: "Uranus and Neptune are ice giants, rich in chilly materials like water, methane, and ammonia."
    gg-5: "Tap each giant planet to hear what makes it stand out!"
    gg-x-jupiter: "Jupiter is the largest planet and has a giant storm called the Great Red Spot."
    gg-x-saturn: "Saturn's rings are wide, bright, and made of ice and rock."
    gg-x-uranus: "Uranus is tipped on its side as it rolls around the Sun."
    gg-x-neptune: "Neptune is the farthest planet and has supersonic winds."
    mr-0: "Why do some planets travel with moons and sparkling rings around them?"
    mr-1: "A moon is a natural object that orbits a planet instead of orbiting the Sun directly."
    mr-2: "Earth has one moon, but Jupiter and Saturn each have many moons circling them."
    mr-3: "Rings are not solid hoops — they are swarms of icy chunks and dust orbiting together."
    mr-4: "Moons and rings both follow gravity, looping around their planet again and again."
    mr-5: "Tap the orbiting pieces to compare moons and rings!"
    mr-x-moon: "A moon is one larger natural world orbiting a planet."
    mr-x-ring: "A ring is made from many small pieces sharing nearby orbits."
    mr-x-gravity: "Gravity keeps both moons and ring pieces looping around the planet."
    ac-0: "What are all those small worlds racing between the planets?"
    ac-1: "Asteroids are rocky leftovers from the time when the planets were forming."
    ac-2: "Most asteroids travel in a wide belt between Mars and Jupiter."
    ac-3: "Comets are icy bodies that can grow glowing tails when sunlight warms them."
    ac-4: "Asteroids are mostly rock; comets are more like dusty snowballs from the cold outer Solar System."
    ac-5: "Tap each small body to decide: rocky asteroid or icy comet?"
    ac-x-asteroid: "Asteroid — rocky, cratered, and often found between Mars and Jupiter."
    ac-x-comet: "Comet — icy and dusty, with a tail that points away from the Sun."
    ac-x-belt: "The asteroid belt is the busy zone between Mars and Jupiter."
    ws-0: "How do eight planets fit together into one Solar System?"
    ws-1: "Starting at the Sun, the planet order is Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune."
    ws-2: "Mercury is closest to the Sun, and Neptune is the farthest planet."
    ws-3: "Space is huge — the outer planets are billions of kilometers from the Sun."
    ws-4: "Planets near the Sun get more light and heat; far-away planets are much colder."
    ws-5: "Tap the map to practice order, distance, and temperature!"
    ws-x-closest: "Mercury is closest to the Sun."
    ws-x-earth: "Earth is the third planet from the Sun."
    ws-x-giants: "Jupiter and Saturn begin the giant outer planet zone."
    ws-x-cold: "Neptune is far away, so sunlight there is very weak."
    cn-0: "Why do star patterns seem to make pictures in the night sky?"
    cn-1: "A constellation is a pattern of stars that people imagined into pictures and stories."
    cn-2: "The stars in a constellation are usually not close together — they just line up from our view on Earth."
    cn-3: "Sailors and explorers used familiar constellations to find their way at night."
    cn-4: "As Earth orbits the Sun, different constellations appear in different seasons."
    cn-5: "Tap the sky clues to learn how people use constellations!"
    cn-x-picture: "A constellation picture helps people remember a star pattern."
    cn-x-guide: "Some star patterns helped travelers keep direction at night."
    cn-x-season: "Different constellations mark different parts of Earth's year."
    sl-0: "How does a star's life story begin, shine, and end?"
    sl-1: "Stars are born inside giant clouds of gas and dust called nebulae."
    sl-2: "Gravity squeezes part of the cloud tighter and hotter until a new star switches on."
    sl-3: "A star shines for millions or billions of years by making energy in its core."
    sl-4: "When a massive star runs out of fuel, it can swell up and explode in a supernova."
    sl-5: "Drag through the stages of a massive star's life!"
    sl-x-nebula: "Nebula — gas and dust gather in a glowing star nursery."
    sl-x-newborn: "New star — gravity makes the center hot enough to shine."
    sl-x-giant: "Red giant — the star swells as its fuel changes."
    sl-x-supernova: "Supernova — a massive star can explode and scatter new ingredients into space."
    ne-0: "What are those glowing clouds drifting between the stars?"
    ne-1: "A nebula is a giant cloud of gas and dust floating in space."
    ne-2: "Nebulae can glow in beautiful colors when nearby stars light up their gas."
    ne-3: "Deep inside some nebulae, gravity gathers material and new stars are born."
    ne-4: "Old stars can also blow gas back into space, recycling material for future stars and planets."
    ne-5: "Tap the glowing cloud to find what nebulae are made for!"
    ne-x-gas: "Gas is the main material in many nebulae."
    ne-x-dust: "Tiny dust grains help clouds block and reflect starlight."
    ne-x-stars: "Some nebulae are nurseries where new stars begin."
    ga-0: "How can billions of stars belong to one giant space city?"
    ga-1: "A galaxy is a huge family of stars, gas, dust, and dark matter held together by gravity."
    ga-2: "Many galaxies have spiral arms, where bright young stars trace curling paths."
    ga-3: "We live in the Milky Way galaxy, a vast spiral galaxy with our Sun in one arm."
    ga-4: "There are billions of galaxies scattered across the universe, each with its own star family."
    ga-5: "Tap the galaxy map to compare where we are and what galaxies contain!"
    ga-x-stars: "Galaxies can contain billions or even trillions of stars."
    ga-x-milky: "The Milky Way is our home galaxy."
    ga-x-universe: "The universe contains billions of galaxies beyond our own."
    bh-0: "What kind of object has gravity so strong that even light cannot escape?"
    bh-1: "A black hole packs a lot of mass into a very small region, making gravity incredibly strong."
    bh-2: "The boundary where escape becomes impossible is called the event horizon."
    bh-3: "Many black holes form when a giant star collapses at the end of its life."
    bh-4: "We spot black holes by the way they bend light, heat nearby gas, and tug on nearby stars."
    bh-5: "Tap the clues astronomers use to find hidden black holes!"
    bh-x-light: "Strong gravity can bend the path of light around a black hole."
    bh-x-gas: "Gas falling inward can heat up and glow before it crosses the event horizon."
    bh-x-tug: "Nearby stars can reveal a black hole by orbiting something invisible."
    lo-0: "What is it like to live while circling Earth sixteen times a day?"
    lo-1: "The International Space Station orbits Earth about every 90 minutes."
    lo-2: "Astronauts float because the station and crew are falling around Earth together."
    lo-3: "Crews exercise, sleep, fix equipment, and run science experiments in microgravity."
    lo-4: "Experiments on the ISS help us learn about Earth, space, medicine, and future exploration."
    lo-5: "Tap parts of an astronaut's orbit day!"
    lo-x-orbit: "One lap around Earth takes the station about 90 minutes."
    lo-x-float: "Astronauts float because they are in continuous free-fall."
    lo-x-lab: "The ISS is a laboratory for science in microgravity."
    gt-0: "How does a rocket climb from the launch pad all the way into orbit?"
    gt-1: "Rockets push hot gas down hard, and that thrust pushes the rocket upward."
    gt-2: "To stay in orbit, a spacecraft must move sideways incredibly fast around Earth."
    gt-3: "Rocket stages drop away when their fuel is used, making the remaining spacecraft lighter."
    gt-4: "Many modern rockets can land back on Earth so parts can be flown again."
    gt-5: "Tap the launch steps to see what a rocket needs!"
    gt-x-thrust: "Thrust pushes a rocket upward by throwing hot gas downward."
    gt-x-speed: "Orbital speed lets a spacecraft keep falling around Earth instead of back to the ground."
    gt-x-reuse: "Reusable boosters can land and fly again on later missions."
    sa-0: "What are the machines circling Earth doing for us every day?"
    sa-1: "Satellites are machines that circle Earth in carefully planned orbits."
    sa-2: "Some satellites fly low for close-up views, while others stay high to watch the same region."
    sa-3: "Satellites help with maps, phones, television, internet, weather, and science."
    sa-4: "Weather satellites can watch giant storms from high above Earth before they reach people."
    sa-5: "Tap each satellite signal to match it with a helpful job!"
    sa-x-gps: "GPS satellites help phones and cars find their location."
    sa-x-comms: "Communication satellites relay messages, broadcasts, and internet data."
    sa-x-storm: "Weather satellites track storms and cloud patterns from space."
    sw-0: "How can astronauts work outside a spacecraft where there is no air?"
    sw-1: "A spacesuit is a tiny spacecraft astronauts wear, with air, pressure, cooling, and protection."
    sw-2: "The suit protects astronauts from vacuum, extreme temperatures, tiny debris, and harsh sunlight."
    sw-3: "A spacewalk is when astronauts leave their spacecraft to repair, build, or test equipment."
    sw-4: "Tethers and handrails keep spacewalkers connected while they move carefully in microgravity."
    sw-5: "Tap the spacesuit parts that keep an astronaut safe!"
    sw-x-air: "The backpack supplies oxygen so the astronaut can breathe."
    sw-x-cooling: "Cooling loops carry heat away from the astronaut's body."
    sw-x-tether: "A tether keeps the astronaut attached to the spacecraft."
    mb-0: "What would explorers need to build a safe home on Mars?"
    mb-1: "Mars is a cold, dusty desert world with thin air and about half Earth's diameter."
    mb-2: "A trip to Mars can take around seven months, so crews must plan every kilogram carefully."
    mb-3: "Future explorers will need habitats that hold air pressure, block radiation, and keep dust outside."
    mb-4: "They will need to bring or make air, water, food, power, and spare parts far from Earth."
    mb-5: "Tap the Mars base systems that would help people live off Earth!"
    mb-x-habitat: "A habitat keeps breathable air inside and Mars dust outside."
    mb-x-power: "Solar panels or nuclear power could run heaters, labs, and life support."
    mb-x-rover: "Rovers would carry explorers and tools across the Martian surface."
