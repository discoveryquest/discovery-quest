            - { say: ws-4, caption: "Planets near the Sun get more light and heat; far-away planets are much colder.", view: { kind: orbit, key: ws4, bodies: [ { id: sun, role: star }, { id: inner, role: planet, color: earth, orbits: sun, radius: 58, period: 6 }, { id: outer, role: planet, color: neptune, orbits: sun, radius: 118, period: 12 } ] } }
