    whole-system:
      title: The Whole System
      sections:
        - id: ask
          label: The question
          beats:
            - { say: ws-0, caption: "How do eight planets fit together into one Solar System?", view: { kind: orbit, key: ws0, bodies: [ { id: sun, role: star }, { id: mercury, role: moon, color: mercury, orbits: sun, radius: 34, period: 4 }, { id: venus, role: planet, color: venus, orbits: sun, radius: 48, period: 5 }, { id: earth, role: planet, color: earth, orbits: sun, radius: 62, period: 6 }, { id: mars, role: moon, color: mars, orbits: sun, radius: 76, period: 7 }, { id: jupiter, role: planet, color: jupiter, orbits: sun, radius: 94, period: 9 }, { id: saturn, role: planet, color: saturn, orbits: sun, radius: 110, period: 11 } ] } }
        - id: order
          label: Planet order
          beats:
            - { say: ws-1, caption: "Starting at the Sun, the planet order is Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune.", view: { kind: field, key: ws1, tint: deep-space, density: high, label: "Mercury • Venus • Earth • Mars • Jupiter • Saturn • Uranus • Neptune" } }
            - { say: ws-2, caption: "Mercury is closest to the Sun, and Neptune is the farthest planet.", view: { kind: orbit, key: ws2, bodies: [ { id: sun, role: star }, { id: mercury, role: moon, color: mercury, orbits: sun, radius: 44, period: 4 }, { id: neptune, role: planet, color: neptune, orbits: sun, radius: 118, period: 12 } ] } }
        - id: scale
