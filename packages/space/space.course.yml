        - id: ask
          label: The question
          beats:
            - { say: sa-0, caption: "What are the machines circling Earth doing for us every day?", view: { kind: orbit, key: sa0, bodies: [ { id: earth, role: planet, color: earth }, { id: sat1, role: moon, color: "#dbeafe", orbits: earth, radius: 70, period: 5 }, { id: sat2, role: moon, color: "#fef3c7", orbits: earth, radius: 100, period: 8 } ] } }
        - id: orbits
          label: Around Earth
          beats:
            - { say: sa-1, caption: "Satellites are machines that circle Earth in carefully planned orbits.", view: { kind: orbit, key: sa1, bodies: [ { id: earth, role: planet, color: earth }, { id: satellite, role: moon, color: "#dbeafe", orbits: earth, radius: 86, period: 6 } ] } }
            - { say: sa-2, caption: "Some satellites fly low for close-up views, while others stay high to watch the same region.", view: { kind: orbit, key: sa2, bodies: [ { id: earth, role: planet, color: earth }, { id: low, role: moon, color: "#dbeafe", orbits: earth, radius: 58, period: 4 }, { id: high, role: moon, color: "#fef3c7", orbits: earth, radius: 112, period: 10 } ] } }
        - id: jobs
