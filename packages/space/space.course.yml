          beats:
            - { say: sl-1, caption: "Stars are born inside giant clouds of gas and dust called nebulae.", view: { kind: field, key: sl1, tint: nebula, density: high, label: "Nebula nursery" } }
            - { say: sl-2, caption: "Gravity squeezes part of the cloud tighter and hotter until a new star switches on.", view: { kind: body, key: sl2, body: { role: star, glow: true }, label: "A newborn star" } }
