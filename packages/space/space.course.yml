        - id: ask
          label: The question
          beats:
            - { say: sw-0, caption: "How can astronauts work outside a spacecraft where there is no air?", view: { kind: field, key: sw0, tint: deep-space, density: high, label: "Outside the spacecraft" } }
        - id: suit
          label: Spacesuit
          beats:
            - { say: sw-1, caption: "A spacesuit is a tiny spacecraft astronauts wear, with air, pressure, cooling, and protection.", view: { kind: body, key: sw1, body: { role: moon, color: "#e0f2fe", glow: true }, label: "Spacesuit systems" } }
