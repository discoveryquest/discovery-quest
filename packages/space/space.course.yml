course:
  formatVersion: 1
  id: space
  title: Space Quest
  subject: Science
  companion: luna
  voice:
    id: jessica
    profile: teaching-slow
  ui:
    done: "Mission complete!"
    backToMap: "Back to the star map"
    score: "You logged {correct} of {total} discoveries!"
  reactions:
    praise: [praise-0, praise-1, praise-2, praise-3]
    oops: [oops-0, oops-1, oops-2]
    solved: [solved-0, solved-1]
  engine: ">=1.0"

  worlds:
    - id: backyard-sky
      title: The Backyard Sky
      emoji: 🌙
      color: "#22D3EE"
      blurb: Earth, the Moon, the Sun, seasons, and gravity.
      stations:
        - { id: moon-phases, title: Moon Phases, icon: 🌗, sub: why the Moon changes shape, board: practice, bands: [0], lesson: moon-phases, concept: moon-phases }
        - { id: day-night, title: Day & Night, icon: 🌍, sub: why we have day and night, board: practice, bands: [1], lesson: day-night, concept: day-night-cycle }
        - { id: the-sun, title: Our Star, icon: 🌞, sub: the Sun, our nearest star, board: practice, bands: [2], lesson: the-sun, concept: our-star }
        - { id: seasons, title: The Seasons, icon: 🍂, sub: why the year changes, board: practice, bands: [3], lesson: seasons, concept: seasons }
        - { id: gravity, title: Gravity, icon: ⬇️, sub: the pull that holds us down, board: practice, bands: [4], lesson: gravity, concept: gravity-pulls-down }

    - id: cosmic-neighborhood
      title: Cosmic Neighborhood
      emoji: 🪐
      color: "#A78BFA"
      blurb: The Solar System — planets, moons, rings, and space rocks.
      stations:
        - { id: inner-outer, title: Inner & Outer Planets, icon: 🪨, sub: rocky planets vs gas giants, board: practice, bands: [5], lesson: inner-outer, concept: inner-vs-outer-planets }
        - { id: gas-giants, title: The Gas Giants, icon: 🪐, sub: the giant outer planets, board: practice, bands: [6], lesson: gas-giants, concept: gas-giants }
        - { id: moons-rings, title: Moons & Rings, icon: 💍, sub: moons and ring systems, board: practice, bands: [7], lesson: moons-rings, concept: moons-and-rings }
        - { id: asteroids-comets, title: Asteroids & Comets, icon: ☄️, sub: space rocks and icy visitors, board: practice, bands: [8], lesson: asteroids-comets, concept: small-bodies }
        - { id: whole-system, title: The Whole System, icon: 📏, sub: order and scale, board: practice, bands: [9], lesson: whole-system, concept: solar-system-order }

    - id: deep-space
      title: Deep Space
      emoji: 🌌
      color: "#818CF8"
      blurb: Constellations, the lives of stars, nebulae, galaxies, and black holes.
      stations:
        - { id: constellations, title: Constellations, icon: ✨, sub: patterns in the stars, board: practice, bands: [10], lesson: constellations, concept: constellations }
        - { id: star-life, title: A Star's Life, icon: ⭐, sub: how stars are born and die, board: practice, bands: [11], lesson: star-life, concept: star-lifecycle }
        - { id: nebulae, title: Nebulae, icon: ☁️, sub: where stars are born, board: practice, bands: [12], lesson: nebulae, concept: nebulae }
        - { id: galaxies, title: Galaxies, icon: 🌌, sub: islands of billions of stars, board: practice, bands: [13], lesson: galaxies, concept: galaxies }
        - { id: black-holes, title: Black Holes, icon: 🕳️, sub: gravity so strong light can't escape, board: practice, bands: [14], lesson: black-holes, concept: black-holes }

    - id: human-element
      title: The Human Element
      emoji: 🛰️
      color: "#2DD4BF"
      blurb: Satellites, the ISS, spacewalks, rockets, and living on Mars.
      stations:
        - { id: life-in-orbit, title: Life in Orbit, icon: 🛰️, sub: living on the ISS, board: practice, bands: [15], lesson: life-in-orbit, concept: iss-astronauts }
        - { id: getting-there, title: Getting There, icon: 🚀, sub: how we reach space, board: practice, bands: [16], lesson: getting-there, concept: space-travel-tech }
        - { id: satellites, title: Satellites, icon: 📡, sub: helpers orbiting Earth, board: practice, bands: [17], lesson: satellites, concept: satellites }
        - { id: spacewalks, title: Spacewalks, icon: 🧑‍🚀, sub: working outside the ship, board: practice, bands: [18], lesson: spacewalks, concept: spacesuits }
        - { id: mars-base, title: Mars Base, icon: 🔴, sub: living on another world, board: practice, bands: [19], lesson: mars-base, concept: living-off-earth }

  lessons:
    moon-phases:
      title: Moon Phases
      sections:
        - id: ask
          label: The question
          beats:
            - { say: mp-0, caption: "Why does the Moon seem to change shape each night?", view: { kind: body, key: mp0, body: { role: moon, glow: true }, label: "The Moon" } }
        - id: light
          label: Sunlight
          beats:
            - { say: mp-1, caption: "The Moon makes no light of its own — it shines by reflecting sunlight, and the Sun always lights the half facing it.", view: { kind: moonPhase, key: mp1, interactive: false } }
        - id: phases
          label: The phases
          beats:
            - { say: mp-3, caption: "As the Moon orbits Earth, we see more or less of that sunlit half — and that's a phase. One full cycle takes about 29 days.", view: { kind: moonPhase, key: mp3, variant: strip, active: -1 } }
            - { say: mp-x-new, caption: "New Moon — the Moon sits between Earth and the Sun, so the side facing us is dark.", view: { kind: moonPhase, key: mpc0, variant: strip, active: 0 } }
            - { say: mp-x-waxing-crescent, caption: "Waxing Crescent — a thin sliver of the lit side appears, and it's growing.", view: { kind: moonPhase, key: mpc1, variant: strip, active: 1 } }
            - { say: mp-x-first, caption: "First Quarter — we see half of the Moon's lit side.", view: { kind: moonPhase, key: mpc2, variant: strip, active: 2 } }
            - { say: mp-x-waxing-gibbous, caption: "Waxing Gibbous — most of the lit side shows now, and it's still growing.", view: { kind: moonPhase, key: mpc3, variant: strip, active: 3 } }
            - { say: mp-x-full, caption: "Full Moon — the Moon is opposite the Sun, so we see its whole lit face.", view: { kind: moonPhase, key: mpc4, variant: strip, active: 4 } }
            - { say: mp-x-waning-gibbous, caption: "Waning Gibbous — most of the lit side still shows, but now it's shrinking.", view: { kind: moonPhase, key: mpc5, variant: strip, active: 5 } }
            - { say: mp-x-last, caption: "Last Quarter — we see the other half of the lit side.", view: { kind: moonPhase, key: mpc6, variant: strip, active: 6 } }
            - { say: mp-x-waning-crescent, caption: "Waning Crescent — only a thin sliver of light is left before the next new moon.", view: { kind: moonPhase, key: mpc7, variant: strip, active: 7 } }
        - id: explore
          label: Explore
          beats:
            - { say: mp-5, caption: "Drag to move the Moon around Earth and watch its phase change!", advance: hold, view: { kind: moonPhase, key: mp-explore, interactive: true, says: { new: mp-x-new, waxingCrescent: mp-x-waxing-crescent, first: mp-x-first, waxingGibbous: mp-x-waxing-gibbous, full: mp-x-full, waningGibbous: mp-x-waning-gibbous, last: mp-x-last, waningCrescent: mp-x-waning-crescent } } }
    day-night:
      title: Day & Night
      sections:
        - id: ask
          label: The question
          beats:
            - { say: dn-0, caption: "Have you ever wondered why it gets dark at night?", view: { kind: body, key: dn0, body: { role: planet, color: earth, glow: true }, label: "Earth" } }
        - id: spin
          label: Earth spins
          beats:
            - { say: dn-1, caption: "Earth spins like a top — one full spin takes about 24 hours.", view: { kind: body, key: dn1, body: { role: planet, color: earth, tilt: true, glow: true }, label: "One full spin" } }
        - id: sides
          label: Day and night
          beats:
            - { say: dn-2, caption: "The side facing the Sun has daytime; the side facing away has night.", view: { kind: body, key: dn2, body: { role: planet, color: earth, phase: 0.5, glow: true }, label: "Day side and night side" } }
            - { say: dn-3, caption: "It's Earth's spinning — not the Sun moving — that gives us day and night.", view: { kind: orbit, key: dn3, bodies: [ { id: sun, role: star }, { id: earth, role: planet, color: earth, orbits: sun, radius: 78, period: 12 } ] } }
            - { say: dn-4, caption: "One full spin equals one day — you get sunshine and darkness every 24 hours.", view: { kind: field, key: dn4, tint: deep-space, density: medium, label: "24 hours: sunshine, then darkness" } }
        - id: explore
          label: Explore
          beats:
            - { say: dn-5, caption: "Drag to spin Earth through a full day!", advance: hold, view: { kind: scrub, key: dn-explore, base: { kind: spin }, states: [ { id: dawn, label: Dawn, say: dn-x-dawn, caption: "Dawn — the Sun peeks over the horizon as Earth turns toward it." }, { id: noon, label: Noon, say: dn-x-noon, caption: "Noon — your part of Earth faces the Sun directly." }, { id: dusk, label: Dusk, say: dn-x-dusk, caption: "Dusk — Earth turns away and the Sun sinks toward the horizon." }, { id: night, label: Night, say: dn-x-night, caption: "Night — your side of Earth faces away from the Sun." } ] } }
    the-sun:
      title: Our Star
      sections:
        - id: ask
          label: The question
          beats:
            - { say: su-0, caption: "Look up on a clear day — what is that brilliant ball of light?", view: { kind: body, key: su0, body: { role: star, glow: true }, label: "The Sun" } }
        - id: what
          label: What it is
          beats:
            - { say: su-1, caption: "The Sun is a star — the closest one to Earth.", view: { kind: orbit, key: su1, bodies: [ { id: sun, role: star }, { id: earth, role: planet, color: earth, orbits: sun, radius: 90, period: 10 } ] } }
            - { say: su-2, caption: "It's a giant ball of super-hot, glowing gas.", view: { kind: body, key: su2, body: { role: star, glow: true }, label: "Super-hot glowing gas" } }
        - id: size
          label: How big
          beats:
            - { say: su-3, caption: "The Sun is so large that over a million Earths could fit inside.", view: { kind: compare, key: su3, items: [ { label: "Sun", relSize: 10, role: star }, { label: "Earth", relSize: 1, role: planet, color: earth } ] } }
        - id: life
          label: Why it matters
          beats:
            - { say: su-4, caption: "The Sun gives Earth almost all of its light and heat — without it, life couldn't exist.", view: { kind: orbit, key: su4, bodies: [ { id: sun, role: star }, { id: earth, role: planet, color: earth, orbits: sun, radius: 96, period: 12 } ] } }
        - id: explore
          label: Explore
          beats:
            - { say: su-5, caption: "Tap each part of the Sun to explore what's inside!", advance: hold, view: { kind: reveal, key: su-explore, base: { kind: body, body: { role: star, glow: true } }, hotspots: [ { id: core, label: "Core", say: su-x-core, caption: "The core is the engine — energy made here takes thousands of years to reach the surface.", x: 50, y: 50 }, { id: surface, label: "Surface", say: su-x-surface, caption: "The surface blazes at about 5,500 degrees Celsius.", x: 80, y: 30 }, { id: rays, label: "Sunlight", say: su-x-rays, caption: "Light and heat pour out and travel 8 minutes to reach Earth.", x: 15, y: 15 } ] } }
    seasons:
      title: The Seasons
      sections:
        - id: ask
          label: The question
          beats:
            - { say: se-0, caption: "Why is summer hot and winter cold, even though Earth stays the same distance from the Sun?", view: { kind: orbit, key: se0, bodies: [ { id: sun, role: star }, { id: earth, role: planet, color: earth, orbits: sun, radius: 70, period: 10 } ] } }
        - id: tilt
          label: Earth's tilt
          beats:
            - { say: se-1, caption: "Earth is tilted as it circles the Sun — not straight up, but at an angle.", view: { kind: body, key: se1, body: { role: planet, color: earth, tilt: true, glow: true }, label: "Tilted Earth" } }
            - { say: se-2, caption: "When your half of Earth tilts toward the Sun, sunlight hits more directly — that's summer.", view: { kind: orbit, key: se2, bodies: [ { id: sun, role: star }, { id: earth, role: planet, color: earth, orbits: sun, radius: 82, period: 9 } ] } }
        - id: seasons
          label: Seasons
          beats:
            - { say: se-3, caption: "When your half tilts away, sunlight spreads out and feels weaker — that's winter.", view: { kind: orbit, key: se3, bodies: [ { id: sun, role: star }, { id: earth, role: planet, color: earth, orbits: sun, radius: 70, period: 10 } ] } }
            - { say: se-4, caption: "Seasons are caused by Earth's tilt, not by how close we are to the Sun.", view: { kind: body, key: se4, body: { role: planet, color: earth, tilt: true, glow: true }, label: "Tilt, not distance" } }
        - id: explore
          label: Explore
          beats:
            - { say: se-5, caption: "Drag Earth around its orbit to walk through the four seasons!", advance: hold, view: { kind: scrub, key: se-explore, base: { kind: seasons }, states: [ { id: spring, label: Spring, say: se-x-spring, caption: "Spring — neither hemisphere tilts much toward the Sun; days grow longer." }, { id: summer, label: Summer, say: se-x-summer, caption: "Summer — your hemisphere tilts toward the Sun; long days and strong sunlight." }, { id: autumn, label: Autumn, say: se-x-autumn, caption: "Autumn — your hemisphere tilts away again; days shorten and cool." }, { id: winter, label: Winter, say: se-x-winter, caption: "Winter — your hemisphere tilts away the most; short days and weak sunlight." } ] } }
    gravity:
      title: Gravity
      sections:
        - id: ask
          label: The question
          beats:
            - { say: gr-0, caption: "Drop anything and it falls — why does everything always pull toward the ground?", view: { kind: body, key: gr0, body: { role: planet, color: earth, glow: true }, label: "Earth" } }
        - id: pull
          label: The pull
          beats:
            - { say: gr-1, caption: "Gravity is a pull. Everything with mass pulls on everything else.", view: { kind: field, key: gr1, tint: deep-space, density: medium, label: "Every mass pulls on every other mass" } }
            - { say: gr-2, caption: "Earth's gravity pulls things toward its center — that's why things fall down.", view: { kind: body, key: gr2, body: { role: planet, color: earth, glow: true }, label: "Toward Earth's center" } }
        - id: mass
          label: Mass matters
          beats:
            - { say: gr-3, caption: "The more mass something has, the stronger its gravity pull.", view: { kind: compare, key: gr3, items: [ { label: "Earth", relSize: 4, role: planet, color: earth }, { label: "Moon", relSize: 1, role: moon } ] } }
            - { say: gr-4, caption: "Gravity holds you to the ground, keeps the Moon in orbit, and holds Earth near the Sun.", view: { kind: orbit, key: gr4, bodies: [ { id: earth, role: planet, color: earth }, { id: moon, role: moon, orbits: earth, radius: 64, period: 6 } ] } }
        - id: explore
          label: Explore
          beats:
            - { say: gr-5, caption: "Tap each world to feel its gravity!", advance: hold, view: { kind: reveal, key: gr-explore, base: { kind: fall, items: [ { label: "Jupiter", emoji: "🪐", g: 2.5 }, { label: "Earth", emoji: "🌍", g: 1 }, { label: "Moon", emoji: "🌙", g: 0.17 } ] }, hotspots: [ { id: jupiter, label: "Jupiter", say: gr-x-jupiter, caption: "Jupiter is enormous — its gravity is 2.5 times stronger than Earth's.", x: 25, y: 42 }, { id: earth, label: "Earth", say: gr-x-earth, caption: "Earth's gravity feels normal to you — it's what you were born with!", x: 58, y: 42 }, { id: moon, label: "Moon", say: gr-x-moon, caption: "The Moon is small — its gravity is about one-sixth of Earth's.", x: 91, y: 42 } ] } }
    inner-outer:
      title: Inner & Outer Planets
      sections:
        - id: ask
          label: The question
          beats:
            - { say: io-0, caption: "Why do the planets near the Sun feel so different from the planets far away?", view: { kind: orbit, key: io0, bodies: [ { id: sun, role: star }, { id: mercury, role: moon, color: mercury, orbits: sun, radius: 42, period: 4 }, { id: venus, role: planet, color: venus, orbits: sun, radius: 58, period: 6 }, { id: earth, role: planet, color: earth, orbits: sun, radius: 74, period: 8 }, { id: mars, role: moon, color: mars, orbits: sun, radius: 90, period: 10 }, { id: jupiter, role: planet, color: jupiter, orbits: sun, radius: 116, period: 14 } ] } }
        - id: inner
          label: Inner planets
          beats:
            - { say: io-1, caption: "The four inner planets — Mercury, Venus, Earth, and Mars — are small, solid, rocky worlds.", view: { kind: compare, key: io1, items: [ { label: "Mercury", relSize: 0.32, role: moon, color: mercury }, { label: "Venus", relSize: 0.76, role: planet, color: venus }, { label: "Earth", relSize: 0.8, role: planet, color: earth }, { label: "Mars", relSize: 0.43, role: moon, color: mars } ] } }
            - { say: io-2, caption: "They orbit close to the Sun, where it is warmer and rocky material could clump together.", view: { kind: orbit, key: io2, bodies: [ { id: sun, role: star }, { id: mercury, role: moon, color: mercury, orbits: sun, radius: 48, period: 4 }, { id: venus, role: planet, color: venus, orbits: sun, radius: 66, period: 6 }, { id: earth, role: planet, color: earth, orbits: sun, radius: 84, period: 8 }, { id: mars, role: moon, color: mars, orbits: sun, radius: 102, period: 10 } ] } }
        - id: outer
          label: Outer planets
          beats:
            - { say: io-3, caption: "The outer planets — Jupiter, Saturn, Uranus, and Neptune — are much larger gas and ice giants.", view: { kind: compare, key: io3, items: [ { label: "Jupiter", relSize: 1, role: planet, color: jupiter }, { label: "Saturn", relSize: 0.86, role: planet, color: saturn }, { label: "Uranus", relSize: 0.36, role: planet, color: uranus }, { label: "Neptune", relSize: 0.35, role: planet, color: neptune } ] } }
            - { say: io-4, caption: "The farther you travel from the Sun, the colder and wider the Solar System becomes.", view: { kind: field, key: io4, tint: deep-space, density: high, label: "Rocky inside, giant outside" } }
        - id: explore
          label: Explore
          beats:
            - { say: io-5, caption: "Tap planets to sort the inner rocky worlds from the outer giants!", advance: hold, view: { kind: reveal, key: io-explore, base: { kind: field, tint: deep-space, density: high, label: "Inner or outer?" }, hotspots: [ { id: mercury, label: "Mercury", emoji: "☿️", say: io-x-mercury, caption: "Mercury is an inner planet — small, rocky, and closest to the Sun.", x: 22, y: 58 }, { id: earth, label: "Earth", emoji: "🌍", say: io-x-earth, caption: "Earth is an inner rocky planet with a solid surface.", x: 38, y: 42 }, { id: jupiter, label: "Jupiter", emoji: "🪐", say: io-x-jupiter, caption: "Jupiter is an outer gas giant, far larger than Earth.", x: 62, y: 44 }, { id: neptune, label: "Neptune", emoji: "🔵", say: io-x-neptune, caption: "Neptune is an outer ice giant, deep in the cold Solar System.", x: 78, y: 58 } ] } }
    gas-giants:
      title: The Gas Giants
      sections:
        - id: ask
          label: The question
          beats:
            - { say: gg-0, caption: "What makes the outer planets so enormous compared with Earth?", view: { kind: compare, key: gg0, items: [ { label: "Earth", relSize: 0.28, role: planet, color: earth }, { label: "Jupiter", relSize: 1, role: planet, color: jupiter } ] } }
        - id: jupiter
          label: Jupiter
          beats:
            - { say: gg-1, caption: "Jupiter is the biggest planet — more than one thousand Earths could fit inside it.", view: { kind: compare, key: gg1, items: [ { label: "Earth", relSize: 0.2, role: planet, color: earth }, { label: "Jupiter", relSize: 1, role: planet, color: jupiter } ] } }
            - { say: gg-2, caption: "It has no solid ground like Earth; it is mostly hydrogen and helium gas wrapped around a deep interior.", view: { kind: body, key: gg2, body: { role: planet, color: jupiter, glow: true }, label: "Jupiter" } }
        - id: ringed
          label: Rings and ice
          beats:
            - { say: gg-3, caption: "Saturn is famous for bright rings made of countless icy and rocky pieces.", view: { kind: body, key: gg3, body: { role: planet, color: saturn, rings: 18, glow: true }, label: "Saturn" } }
            - { say: gg-4, caption: "Uranus and Neptune are ice giants, rich in chilly materials like water, methane, and ammonia.", view: { kind: compare, key: gg4, items: [ { label: "Uranus", relSize: 0.72, role: planet, color: uranus }, { label: "Neptune", relSize: 0.7, role: planet, color: neptune } ] } }
        - id: explore
          label: Explore
          beats:
            - { say: gg-5, caption: "Tap each giant planet to hear what makes it stand out!", advance: hold, view: { kind: reveal, key: gg-explore, base: { kind: field, tint: deep-space, density: high, label: "The giant planets" }, hotspots: [ { id: jupiter, label: "Jupiter", emoji: "🪐", say: gg-x-jupiter, caption: "Jupiter is the largest planet and has a giant storm called the Great Red Spot.", x: 22, y: 45 }, { id: saturn, label: "Saturn", emoji: "💍", say: gg-x-saturn, caption: "Saturn's rings are wide, bright, and made of ice and rock.", x: 42, y: 58 }, { id: uranus, label: "Uranus", emoji: "🧊", say: gg-x-uranus, caption: "Uranus is tipped on its side as it rolls around the Sun.", x: 62, y: 42 }, { id: neptune, label: "Neptune", emoji: "🔵", say: gg-x-neptune, caption: "Neptune is the farthest planet and has supersonic winds.", x: 80, y: 56 } ] } }
    moons-rings:
      title: Moons & Rings
      sections:
        - id: ask
          label: The question
          beats:
            - { say: mr-0, caption: "Why do some planets travel with moons and sparkling rings around them?", view: { kind: orbit, key: mr0, bodies: [ { id: saturn, role: planet, color: saturn }, { id: moon1, role: moon, color: moon, orbits: saturn, radius: 58, period: 5 }, { id: moon2, role: moon, color: moon, orbits: saturn, radius: 84, period: 8 }, { id: moon3, role: moon, color: moon, orbits: saturn, radius: 108, period: 11 } ] } }
        - id: moons
          label: Moons
          beats:
            - { say: mr-1, caption: "A moon is a natural object that orbits a planet instead of orbiting the Sun directly.", view: { kind: orbit, key: mr1, bodies: [ { id: earth, role: planet, color: earth }, { id: moon, role: moon, orbits: earth, radius: 72, period: 6 } ] } }
            - { say: mr-2, caption: "Earth has one moon, but Jupiter and Saturn each have many moons circling them.", view: { kind: compare, key: mr2, items: [ { label: "Earth: 1", relSize: 0.45, role: planet, color: earth }, { label: "Jupiter: many", relSize: 1, role: planet, color: jupiter }, { label: "Saturn: many", relSize: 0.86, role: planet, color: saturn } ] } }
        - id: rings
          label: Rings
          beats:
            - { say: mr-3, caption: "Rings are not solid hoops — they are swarms of icy chunks and dust orbiting together.", view: { kind: body, key: mr3, body: { role: planet, color: saturn, rings: 18, glow: true }, label: "Saturn's rings" } }
            - { say: mr-4, caption: "Moons and rings both follow gravity, looping around their planet again and again.", view: { kind: orbit, key: mr4, bodies: [ { id: planet, role: planet }, { id: innerMoon, role: moon, orbits: planet, radius: 58, period: 5 }, { id: outerMoon, role: moon, orbits: planet, radius: 98, period: 9 } ] } }
        - id: explore
          label: Explore
          beats:
            - { say: mr-5, caption: "Tap the orbiting pieces to compare moons and rings!", advance: hold, view: { kind: reveal, key: mr-explore, base: { kind: orbit, bodies: [ { id: planet, role: planet }, { id: moon, role: moon, orbits: planet, radius: 76, period: 6 }, { id: ringbit, role: moon, orbits: planet, radius: 108, period: 10 } ] }, hotspots: [ { id: moon, label: "Moon", emoji: "🌙", say: mr-x-moon, caption: "A moon is one larger natural world orbiting a planet.", x: 34, y: 42 }, { id: ring, label: "Ring pieces", emoji: "💍", say: mr-x-ring, caption: "A ring is made from many small pieces sharing nearby orbits.", x: 66, y: 58 }, { id: gravity, label: "Gravity", emoji: "⬇️", say: mr-x-gravity, caption: "Gravity keeps both moons and ring pieces looping around the planet.", x: 50, y: 28 } ] } }
    asteroids-comets:
      title: Asteroids & Comets
      sections:
        - id: ask
          label: The question
          beats:
