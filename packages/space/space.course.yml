    black-holes:
      title: Black Holes
      sections:
        - id: ask
          label: The question
          beats:
            - { say: bh-0, caption: "What kind of object has gravity so strong that even light cannot escape?", view: { kind: body, key: bh0, body: { role: blackhole, rings: 18, glow: true }, label: "Black hole" } }
