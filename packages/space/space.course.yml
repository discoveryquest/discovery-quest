  content:
    questions:
      # ── Backyard Sky ──
      - { question: "What gives the Moon its light?", answer: "The Sun", distractors: ["The Moon itself", "Earth's glow"], band: 0 }
      - { question: "Why does the Moon look different on different nights?", answer: "We see more or less of its sunlit half", distractors: ["It changes its shape", "Clouds cover parts of it"], band: 0 }
      - { question: "What causes day and night?", answer: "Earth spinning", distractors: ["The Sun turning off", "The Moon blocking the Sun"], band: 1 }
      - { question: "About how long is one full spin of Earth?", answer: "24 hours", distractors: ["1 hour", "1 week"], band: 1 }
      - { question: "What is the Sun?", answer: "A star", distractors: ["A planet", "A moon"], band: 2 }
      - { question: "Why does the Sun look so much bigger than other stars?", answer: "It's the closest star to us", distractors: ["It's the biggest thing in space", "It is on fire"], band: 2 }
      - { question: "What causes the seasons?", answer: "Earth's tilt", distractors: ["The Sun moving", "Clouds"], band: 3 }
      - { question: "When is it summer where you live?", answer: "When your half of Earth tilts toward the Sun", distractors: ["When Earth is closest to the Sun", "When it rains a lot"], band: 3 }
      - { question: "Which way does Earth's gravity pull things?", answer: "Down, toward Earth's center", distractors: ["Up, into the sky", "Sideways"], band: 4 }
      - { question: "What has stronger gravity?", answer: "Something with more mass", distractors: ["Something more colorful", "Something moving faster"], band: 4 }
      # ── Cosmic Neighborhood ──
      - { question: "How many planets orbit our Sun?", answer: "8", distractors: ["5", "12"], band: 5 }
      - { question: "What are the inner planets mostly made of?", answer: "Rock", distractors: ["Gas", "Ice"], band: 5 }
      - { question: "Which is the biggest planet?", answer: "Jupiter", distractors: ["Earth", "Mars"], band: 6 }
      - { question: "What are Saturn's rings made of?", answer: "Ice and rock", distractors: ["Gas", "Fire"], band: 6 }
      - { question: "Which planet is famous for its rings?", answer: "Saturn", distractors: ["Mars", "Mercury"], band: 7 }
      - { question: "How many moons does Earth have?", answer: "One", distractors: ["Zero", "Twelve"], band: 7 }
      - { question: "What grows a glowing tail near the Sun?", answer: "A comet", distractors: ["A planet", "A moon"], band: 8 }
      - { question: "Where is the asteroid belt?", answer: "Between Mars and Jupiter", distractors: ["Around the Moon", "Past Neptune"], band: 8 }
      - { question: "Which planet is closest to the Sun?", answer: "Mercury", distractors: ["Earth", "Neptune"], band: 9 }
      - { question: "Why are the far-away planets so cold?", answer: "They get less heat from the Sun", distractors: ["They have no color", "They spin slower"], band: 9 }
      # ── Deep Space ──
      - { question: "What is a constellation?", answer: "A pattern of stars", distractors: ["A kind of planet", "A space rock"], band: 10 }
      - { question: "What did people use constellations for?", answer: "To find their way", distractors: ["To cook food", "To make rain"], band: 10 }
      - { question: "Where are stars born?", answer: "In clouds of gas and dust", distractors: ["Inside planets", "On the Moon"], band: 11 }
      - { question: "What can happen when a giant star dies?", answer: "It explodes in a supernova", distractors: ["It turns into a planet", "Nothing at all"], band: 11 }
      - { question: "What is a nebula?", answer: "A cloud of gas and dust", distractors: ["A kind of planet", "A spaceship"], band: 12 }
      - { question: "What happens deep inside nebulae?", answer: "New stars are born", distractors: ["Rockets refuel", "Nothing at all"], band: 12 }
      - { question: "What galaxy do we live in?", answer: "The Milky Way", distractors: ["Andromeda", "The Sun"], band: 13 }
      - { question: "What is a galaxy?", answer: "Billions of stars together", distractors: ["A single big star", "A planet"], band: 13 }
      - { question: "What can't escape a black hole?", answer: "Even light", distractors: ["Only rockets", "Only sound"], band: 14 }
      - { question: "How do scientists find black holes?", answer: "By how they pull on nearby stars", distractors: ["By their bright color", "By listening for them"], band: 14 }
      # ── The Human Element ──
      - { question: "How often does the ISS circle Earth?", answer: "About every 90 minutes", distractors: ["Once a day", "Once a year"], band: 15 }
      - { question: "Why do astronauts float on the ISS?", answer: "They're in free-fall around Earth", distractors: ["There is no gravity in space", "They wear special shoes"], band: 15 }
      - { question: "What pushes a rocket upward?", answer: "Thrust from its engines", distractors: ["Wind", "Magnets"], band: 16 }
      - { question: "What's special about many modern rockets?", answer: "They can land and be reused", distractors: ["They never need fuel", "They are made of paper"], band: 16 }
      - { question: "What do satellites help us with?", answer: "Maps, phones, and weather", distractors: ["Cooking dinner", "Growing plants"], band: 17 }
      - { question: "Where do satellites travel?", answer: "Around Earth", distractors: ["Inside the Sun", "On the Moon"], band: 17 }
      - { question: "Why do astronauts wear spacesuits?", answer: "For air and protection", distractors: ["To look cool", "To go swimming"], band: 18 }
      - { question: "What is a spacewalk?", answer: "Working outside the spacecraft", distractors: ["Walking on Earth", "A type of rocket"], band: 18 }
      - { question: "What is Mars like?", answer: "A cold, dusty desert", distractors: ["A warm ocean world", "A ball of gas"], band: 19 }
      - { question: "What will Mars explorers need to make or bring?", answer: "Air, water, and food", distractors: ["Just sunglasses", "Nothing at all"], band: 19 }

  narration:
    mp-0: "Why does the Moon seem to change shape each night?"
    mp-1: "The Moon makes no light of its own — it shines by reflecting sunlight."
    mp-2: "The Sun always lights one half of the Moon — the half facing the Sun."
    mp-3: "As the Moon orbits Earth, we see more or less of that sunlit half — that's a phase."
    mp-4: "The phases cycle about every 29 days — from new moon to full moon and back."
    mp-5: "Drag to move the Moon around Earth and watch its phase change!"
    mp-x-new: "New Moon — the Moon sits between Earth and the Sun, so the side facing us is dark."
    mp-x-waxing-crescent: "Waxing Crescent — a thin sliver of the lit side appears, and it's growing."
    mp-x-first: "First Quarter — we see half of the Moon's lit side."
    mp-x-waxing-gibbous: "Waxing Gibbous — most of the lit side shows now, and it's still growing."
    mp-x-full: "Full Moon — the Moon is opposite the Sun, so we see its whole lit face."
    mp-x-waning-gibbous: "Waning Gibbous — most of the lit side still shows, but now it's shrinking."
    mp-x-last: "Last Quarter — we see the other half of the lit side."
    mp-x-waning-crescent: "Waning Crescent — only a thin sliver of light is left before the next new moon."
    dn-0: "Have you ever wondered why it gets dark at night?"
    dn-1: "Earth spins like a top — one full spin takes about 24 hours."
    dn-2: "The side facing the Sun has daytime; the side facing away has night."
    dn-3: "It's Earth's spinning — not the Sun moving — that gives us day and night."
    dn-4: "One full spin equals one day — you get sunshine and darkness every 24 hours."
    dn-5: "Drag to spin Earth through a full day!"
    dn-x-dawn: "Dawn — the Sun peeks over the horizon as Earth turns toward it."
    dn-x-noon: "Noon — your part of Earth faces the Sun directly."
    dn-x-dusk: "Dusk — Earth turns away and the Sun sinks toward the horizon."
    dn-x-night: "Night — your side of Earth faces away from the Sun."
    su-0: "Look up on a clear day — what is that brilliant ball of light?"
    su-1: "The Sun is a star — the closest one to Earth."
    su-2: "It's a giant ball of super-hot, glowing gas."
    su-3: "The Sun is so large that over a million Earths could fit inside."
    su-4: "The Sun gives Earth almost all of its light and heat — without it, life couldn't exist."
    su-5: "Tap each part of the Sun to explore what's inside!"
    su-x-core: "The core is the engine — energy made here takes thousands of years to reach the surface."
    su-x-surface: "The surface blazes at about 5,500 degrees Celsius."
    su-x-rays: "Light and heat pour out and travel 8 minutes to reach Earth."
    se-0: "Why is summer hot and winter cold, even though Earth stays the same distance from the Sun?"
    se-1: "Earth is tilted as it circles the Sun — not straight up, but at an angle."
    se-2: "When your half of Earth tilts toward the Sun, sunlight hits more directly — that's summer."
    se-3: "When your half tilts away, sunlight spreads out and feels weaker — that's winter."
    se-4: "Seasons are caused by Earth's tilt, not by how close we are to the Sun."
    se-5: "Drag Earth around its orbit to walk through the four seasons!"
    se-x-spring: "Spring — neither hemisphere tilts much toward the Sun; days grow longer."
    se-x-summer: "Summer — your hemisphere tilts toward the Sun; long days and strong sunlight."
    se-x-autumn: "Autumn — your hemisphere tilts away again; days shorten and cool."
    se-x-winter: "Winter — your hemisphere tilts away the most; short days and weak sunlight."
    gr-0: "Drop anything and it falls — why does everything always pull toward the ground?"
    gr-1: "Gravity is a pull. Everything with mass pulls on everything else."
    gr-2: "Earth's gravity pulls things toward its center — that's why things fall down."
    gr-3: "The more mass something has, the stronger its gravity pull."
    gr-4: "Gravity holds you to the ground, keeps the Moon in orbit, and holds Earth near the Sun."
    gr-5: "Tap each world to feel its gravity!"
    gr-x-jupiter: "Jupiter is enormous — its gravity is 2.5 times stronger than Earth's."
    gr-x-earth: "Earth's gravity feels normal to you — it's what you were born with!"
    gr-x-moon: "The Moon is small — its gravity is about one-sixth of Earth's."
    io-0: "Our Solar System has 8 planets, all circling the Sun."
    io-1: "The 4 inner planets — Mercury, Venus, Earth, Mars — are small and rocky."
    io-2: "The 4 outer planets are huge balls of gas and ice, much farther out."
    gg-0: "Jupiter is the biggest planet — over 1,000 Earths could fit inside!"
    gg-1: "Saturn is famous for its bright rings, made of ice and rock."
    gg-2: "Uranus and Neptune are icy giants, way out in the cold."
    mr-0: "Many planets have moons — Jupiter has dozens of them!"
    mr-1: "Saturn's rings are made of billions of icy chunks."
    mr-2: "Earth has just one moon, but some planets have many."
    ac-0: "A comet is an icy ball that grows a glowing tail near the Sun."
    ac-1: "Asteroids are rocky leftovers from when the planets formed."
    ac-2: "Most asteroids orbit in a belt between Mars and Jupiter."
    ws-0: "Space is huge — the outer planets are billions of kilometers from the Sun."
    ws-1: "Mercury is closest to the Sun; Neptune is the farthest of the 8 planets."
    ws-2: "Planets near the Sun are hot; far-away planets are freezing cold."
    cn-0: "A constellation is a pattern of stars that people imagined into pictures."
    cn-1: "Sailors and explorers used constellations to find their way at night."
    cn-2: "As Earth orbits the Sun, different constellations appear with the seasons."
    sl-0: "Stars are born inside giant clouds of gas and dust called nebulae."
    sl-1: "A star shines for millions or billions of years by burning fuel in its core."
    sl-2: "When a giant star runs out of fuel, it can explode in a supernova."
    ne-0: "A nebula is a giant cloud of gas and dust floating in space."
    ne-1: "New stars are born deep inside nebulae."
    ne-2: "Nebulae glow in beautiful colors — pink, teal, and violet."
    ga-0: "A galaxy is a huge family of billions of stars."
    ga-1: "We live in the Milky Way galaxy."
    ga-2: "There are billions of galaxies scattered across the universe."
    bh-0: "A black hole has gravity so strong that not even light can escape it."
    bh-1: "Many black holes form when a giant star collapses at the end of its life."
    bh-2: "We can't see black holes directly — we spot them by how they pull on nearby stars."
    lo-0: "The International Space Station orbits Earth about every 90 minutes."
    lo-1: "Astronauts float because they're in constant free-fall around Earth."
    lo-2: "Crews run science experiments you can't do on the ground."
    gt-0: "Rockets push hot gas down hard, and that thrust pushes them up into space."
    gt-1: "Reaching orbit takes enormous speed — about 28,000 km/h!"
    gt-2: "Many rockets now land back on Earth so they can be flown again."
    sa-0: "Satellites are machines that circle Earth doing helpful jobs."
    sa-1: "They help with TV, phones, maps, and weather forecasts."
    sa-2: "Weather satellites watch storms from high above the Earth."
    sw-0: "A spacesuit gives astronauts air to breathe and keeps them safe."
    sw-1: "A spacewalk is when astronauts work outside their spacecraft."
    sw-2: "Suits protect them from the freezing, airless vacuum of space."
    mb-0: "Mars is a cold, dusty desert world — about half the size of Earth."
    mb-1: "A trip to Mars takes around 7 months with today's rockets."
    mb-2: "Future explorers will need to bring or make their own air, water, and food."
