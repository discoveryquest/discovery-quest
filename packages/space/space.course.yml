            - { say: cn-4, caption: "As Earth orbits the Sun, different constellations appear in different seasons.", view: { kind: orbit, key: cn4, bodies: [ { id: sun, role: star }, { id: earth, role: planet, color: earth, orbits: sun, radius: 82, period: 9 } ] } }
