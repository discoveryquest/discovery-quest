            - { say: bh-2, caption: "The boundary where escape becomes impossible is called the event horizon.", view: { kind: body, key: bh2, body: { role: blackhole, rings: 12, glow: true }, label: "Event horizon" } }
        - id: clues
          label: How we know
          beats:
            - { say: bh-3, caption: "Many black holes form when a giant star collapses at the end of its life.", view: { kind: body, key: bh3, body: { role: star, glow: true }, label: "A giant star collapses" } }
            - { say: bh-4, caption: "We spot black holes by the way they bend light, heat nearby gas, and tug on nearby stars.", view: { kind: orbit, key: bh4, bodies: [ { id: hole, role: blackhole, rings: 16 }, { id: star, role: star, orbits: hole, radius: 74, period: 8 } ] } }
        - id: explore
          label: Explore
          beats:
            - { say: bh-5, caption: "Tap the clues astronomers use to find hidden black holes!", advance: hold, view: { kind: reveal, key: bh-explore, base: { kind: body, body: { role: blackhole, rings: 18, glow: true }, label: "Hidden, but not helpless" }, hotspots: [ { id: light, label: "Bent light", emoji: "〰️", say: bh-x-light, caption: "Strong gravity can bend the path of light around a black hole.", x: 30, y: 40 }, { id: gas, label: "Hot gas", emoji: "🔥", say: bh-x-gas, caption: "Gas falling inward can heat up and glow before it crosses the event horizon.", x: 58, y: 36 }, { id: tug, label: "Star tug", emoji: "⭐", say: bh-x-tug, caption: "Nearby stars can reveal a black hole by orbiting something invisible.", x: 70, y: 62 } ] } }
    life-in-orbit:
      title: Life in Orbit
      sections:
        - id: ask
          label: The question
          beats:
            - { say: lo-0, caption: "What is it like to live while circling Earth sixteen times a day?", view: { kind: orbit, key: lo0, bodies: [ { id: earth, role: planet, color: earth }, { id: iss, role: moon, color: "#dbeafe", orbits: earth, radius: 78, period: 6 } ] } }
