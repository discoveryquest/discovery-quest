          label: Mars world
          beats:
            - { say: mb-1, caption: "Mars is a cold, dusty desert world with thin air and about half Earth's diameter.", view: { kind: compare, key: mb1, items: [ { label: "Earth", relSize: 1, role: planet, color: earth }, { label: "Mars", relSize: 0.53, role: planet, color: mars } ] } }
            - { say: mb-2, caption: "A trip to Mars can take around seven months, so crews must plan every kilogram carefully.", view: { kind: launch, key: mb2, payload: "🔴" } }
        - id: survival
          label: Staying alive
          beats:
            - { say: mb-3, caption: "Future explorers will need habitats that hold air pressure, block radiation, and keep dust outside.", view: { kind: field, key: mb3, tint: deep-space, density: medium, label: "Habitat shield" } }
            - { say: mb-4, caption: "They will need to bring or make air, water, food, power, and spare parts far from Earth.", view: { kind: field, key: mb4, tint: deep-space, density: medium, label: "Air • water • food • power • parts" } }
        - id: explore
          label: Explore
          beats:
            - { say: mb-5, caption: "Tap the Mars base systems that would help people live off Earth!", advance: hold, view: { kind: reveal, key: mb-explore, base: { kind: body, body: { role: planet, color: mars, glow: true }, label: "Build a Mars base" }, hotspots: [ { id: habitat, label: "Habitat", emoji: "🏠", say: mb-x-habitat, caption: "A habitat keeps breathable air inside and Mars dust outside.", x: 34, y: 45 }, { id: power, label: "Power", emoji: "⚡", say: mb-x-power, caption: "Solar panels or nuclear power could run heaters, labs, and life support.", x: 58, y: 36 }, { id: rover, label: "Rover", emoji: "🚙", say: mb-x-rover, caption: "Rovers would carry explorers and tools across the Martian surface.", x: 72, y: 62 } ] } }

  content:
    questions:
      # ── Backyard Sky ──
      - { question: "What gives the Moon its light?", answer: "The Sun", distractors: ["The Moon itself", "Earth's glow"], band: 0 }
      - { question: "Why does the Moon look different on different nights?", answer: "We see more or less of its sunlit half", distractors: ["It changes its shape", "Clouds cover parts of it"], band: 0 }
      - { question: "What causes day and night?", answer: "Earth spinning", distractors: ["The Sun turning off", "The Moon blocking the Sun"], band: 1 }
      - { question: "About how long is one full spin of Earth?", answer: "24 hours", distractors: ["1 hour", "1 week"], band: 1 }
      - { question: "What is the Sun?", answer: "A star", distractors: ["A planet", "A moon"], band: 2 }
      - { question: "Why does the Sun look so much bigger than other stars?", answer: "It's the closest star to us", distractors: ["It's the biggest thing in space", "It is on fire"], band: 2 }
      - { question: "What causes the seasons?", answer: "Earth's tilt", distractors: ["The Sun moving", "Clouds"], band: 3 }
      - { question: "When is it summer where you live?", answer: "When your half of Earth tilts toward the Sun", distractors: ["When Earth is closest to the Sun", "When it rains a lot"], band: 3 }
      - { question: "Which way does Earth's gravity pull things?", answer: "Down, toward Earth's center", distractors: ["Up, into the sky", "Sideways"], band: 4 }
      - { question: "What has stronger gravity?", answer: "Something with more mass", distractors: ["Something more colorful", "Something moving faster"], band: 4 }
      # ── Cosmic Neighborhood ──
      - { question: "How many planets orbit our Sun?", answer: "8", distractors: ["5", "12"], band: 5 }
      - { question: "What are the inner planets mostly made of?", answer: "Rock", distractors: ["Gas", "Ice"], band: 5 }
      - { question: "Which is the biggest planet?", answer: "Jupiter", distractors: ["Earth", "Mars"], band: 6 }
      - { question: "What are Saturn's rings made of?", answer: "Ice and rock", distractors: ["Gas", "Fire"], band: 6 }
      - { question: "Which planet is famous for its rings?", answer: "Saturn", distractors: ["Mars", "Mercury"], band: 7 }
      - { question: "How many moons does Earth have?", answer: "One", distractors: ["Zero", "Twelve"], band: 7 }
      - { question: "What grows a glowing tail near the Sun?", answer: "A comet", distractors: ["A planet", "A moon"], band: 8 }
      - { question: "Where is the asteroid belt?", answer: "Between Mars and Jupiter", distractors: ["Around the Moon", "Past Neptune"], band: 8 }
      - { question: "Which planet is closest to the Sun?", answer: "Mercury", distractors: ["Earth", "Neptune"], band: 9 }
      - { question: "Why are the far-away planets so cold?", answer: "They get less heat from the Sun", distractors: ["They have no color", "They spin slower"], band: 9 }
      # ── Deep Space ──
      - { question: "What is a constellation?", answer: "A pattern of stars", distractors: ["A kind of planet", "A space rock"], band: 10 }
      - { question: "What did people use constellations for?", answer: "To find their way", distractors: ["To cook food", "To make rain"], band: 10 }
      - { question: "Where are stars born?", answer: "In clouds of gas and dust", distractors: ["Inside planets", "On the Moon"], band: 11 }
      - { question: "What can happen when a giant star dies?", answer: "It explodes in a supernova", distractors: ["It turns into a planet", "Nothing at all"], band: 11 }
      - { question: "What is a nebula?", answer: "A cloud of gas and dust", distractors: ["A kind of planet", "A spaceship"], band: 12 }
      - { question: "What happens deep inside nebulae?", answer: "New stars are born", distractors: ["Rockets refuel", "Nothing at all"], band: 12 }
      - { question: "What galaxy do we live in?", answer: "The Milky Way", distractors: ["Andromeda", "The Sun"], band: 13 }
      - { question: "What is a galaxy?", answer: "Billions of stars together", distractors: ["A single big star", "A planet"], band: 13 }
      - { question: "What can't escape a black hole?", answer: "Even light", distractors: ["Only rockets", "Only sound"], band: 14 }
      - { question: "How do scientists find black holes?", answer: "By how they pull on nearby stars", distractors: ["By their bright color", "By listening for them"], band: 14 }
      # ── The Human Element ──
      - { question: "How often does the ISS circle Earth?", answer: "About every 90 minutes", distractors: ["Once a day", "Once a year"], band: 15 }
      - { question: "Why do astronauts float on the ISS?", answer: "They're in free-fall around Earth", distractors: ["There is no gravity in space", "They wear special shoes"], band: 15 }
      - { question: "What pushes a rocket upward?", answer: "Thrust from its engines", distractors: ["Wind", "Magnets"], band: 16 }
      - { question: "What's special about many modern rockets?", answer: "They can land and be reused", distractors: ["They never need fuel", "They are made of paper"], band: 16 }
      - { question: "What do satellites help us with?", answer: "Maps, phones, and weather", distractors: ["Cooking dinner", "Growing plants"], band: 17 }
      - { question: "Where do satellites travel?", answer: "Around Earth", distractors: ["Inside the Sun", "On the Moon"], band: 17 }
      - { question: "Why do astronauts wear spacesuits?", answer: "For air and protection", distractors: ["To look cool", "To go swimming"], band: 18 }
      - { question: "What is a spacewalk?", answer: "Working outside the spacecraft", distractors: ["Walking on Earth", "A type of rocket"], band: 18 }
      - { question: "What is Mars like?", answer: "A cold, dusty desert", distractors: ["A warm ocean world", "A ball of gas"], band: 19 }
      - { question: "What will Mars explorers need to make or bring?", answer: "Air, water, and food", distractors: ["Just sunglasses", "Nothing at all"], band: 19 }

    practice:
      # ── Backyard Sky / Moon Phases flagship interactive practice ──
      - { station: moon-phases, band: 0, kind: moon-position, say: pr-mp-full, prompt: "Move the Moon to make a Full Moon.", scene: { kind: moonPhase, interactive: true }, target: { phase: full, label: "Full Moon", toleranceDeg: 16 }, feedback: { correctSay: pr-mp-full-ok, hintSay: pr-mp-full-hint } }
      - { station: moon-phases, band: 0, kind: moon-position, say: pr-mp-first, prompt: "Move the Moon to make a First Quarter Moon.", scene: { kind: moonPhase, interactive: true }, target: { phase: first-quarter, label: "First Quarter", toleranceDeg: 16 }, feedback: { correctSay: pr-mp-first-ok, hintSay: pr-mp-first-hint } }
      - { station: moon-phases, band: 0, kind: moon-position, say: pr-mp-waning-crescent, prompt: "Move the Moon to make a Waning Crescent.", scene: { kind: moonPhase, interactive: true }, target: { phase: waning-crescent, label: "Waning Crescent", toleranceDeg: 16 }, feedback: { correctSay: pr-mp-waning-crescent-ok, hintSay: pr-mp-waning-crescent-hint } }
      - { station: day-night, band: 1, kind: earth-spin, say: pr-dn-noon, prompt: "Spin Earth until your town has noon.", target: { state: noon, states: [ { id: dawn, label: Dawn }, { id: noon, label: Noon }, { id: dusk, label: Dusk }, { id: night, label: Night } ] }, feedback: { correctSay: pr-dn-noon-ok, hintSay: pr-dn-noon-hint } }
      - { station: day-night, band: 1, kind: earth-spin, say: pr-dn-night, prompt: "Spin Earth until your town has night.", target: { state: night, states: [ { id: dawn, label: Dawn }, { id: noon, label: Noon }, { id: dusk, label: Dusk }, { id: night, label: Night } ] }, feedback: { correctSay: pr-dn-night-ok, hintSay: pr-dn-night-hint } }
      - { station: the-sun, band: 2, kind: tap-hotspot, say: pr-su-core, prompt: "Tap the part of the Sun where energy is made.", target: { id: core, items: [ { id: core, label: Core, emoji: "🔥", x: 50, y: 50 }, { id: surface, label: Surface, emoji: "☀️", x: 34, y: 34 }, { id: rays, label: Rays, emoji: "✨", x: 74, y: 42 } ] }, feedback: { correctSay: pr-su-core-ok, hintSay: pr-su-core-hint } }
      - { station: the-sun, band: 2, kind: tap-hotspot, say: pr-su-rays, prompt: "Tap the rays that carry light and heat to Earth.", target: { id: rays, items: [ { id: core, label: Core, emoji: "🔥", x: 50, y: 50 }, { id: surface, label: Surface, emoji: "☀️", x: 34, y: 34 }, { id: rays, label: Rays, emoji: "✨", x: 74, y: 42 } ] }, feedback: { correctSay: pr-su-rays-ok, hintSay: pr-su-rays-hint } }
      - { station: seasons, band: 3, kind: orbit-season, say: pr-se-summer, prompt: "Move Earth to summer for the northern half.", target: { state: summer, states: [ { id: spring, label: Spring }, { id: summer, label: Summer }, { id: autumn, label: Autumn }, { id: winter, label: Winter } ] }, feedback: { correctSay: pr-se-summer-ok, hintSay: pr-se-summer-hint } }
      - { station: seasons, band: 3, kind: orbit-season, say: pr-se-winter, prompt: "Move Earth to winter for the northern half.", target: { state: winter, states: [ { id: spring, label: Spring }, { id: summer, label: Summer }, { id: autumn, label: Autumn }, { id: winter, label: Winter } ] }, feedback: { correctSay: pr-se-winter-ok, hintSay: pr-se-winter-hint } }
      - { station: gravity, band: 4, kind: compare-strength, say: pr-gr-strongest, prompt: "Tap the world with the strongest gravity.", target: { id: jupiter, items: [ { id: moon, label: Moon, emoji: "🌙", size: 48 }, { id: earth, label: Earth, emoji: "🌍", size: 66 }, { id: jupiter, label: Jupiter, emoji: "🪐", size: 96 } ] }, feedback: { correctSay: pr-gr-strongest-ok, hintSay: pr-gr-strongest-hint } }
      - { station: gravity, band: 4, kind: compare-strength, say: pr-gr-earth, prompt: "Tap the world whose gravity feels normal to us.", target: { id: earth, items: [ { id: moon, label: Moon, emoji: "🌙", size: 48 }, { id: earth, label: Earth, emoji: "🌍", size: 66 }, { id: jupiter, label: Jupiter, emoji: "🪐", size: 96 } ] }, feedback: { correctSay: pr-gr-earth-ok, hintSay: pr-gr-earth-hint } }
      # ── Cosmic Neighborhood ──
      - { station: inner-outer, band: 5, kind: sort-zones, say: pr-io-sort, prompt: "Sort each planet into inner rocky worlds or outer giants.", target: { zones: [ { id: inner, label: "Inner rocky", emoji: "🪨", hint: "Small and close to the Sun" }, { id: outer, label: "Outer giants", emoji: "🪐", hint: "Huge and far from the Sun" } ], tokens: [ { id: mercury, label: Mercury, emoji: "☿️", zone: inner }, { id: earth, label: Earth, emoji: "🌍", zone: inner }, { id: jupiter, label: Jupiter, emoji: "🪐", zone: outer }, { id: neptune, label: Neptune, emoji: "🔵", zone: outer } ] }, feedback: { correctSay: pr-io-sort-ok, hintSay: pr-io-sort-hint } }
      - { station: inner-outer, band: 5, kind: sort-zones, say: pr-io-rocky-giant, prompt: "Put the rocky planets on one side and the giant planets on the other.", target: { zones: [ { id: rocky, label: "Rocky", emoji: "🪨", hint: "Solid surface" }, { id: giant, label: "Giant", emoji: "🎈", hint: "Gas or ice giant" } ], tokens: [ { id: venus, label: Venus, emoji: "🟡", zone: rocky }, { id: mars, label: Mars, emoji: "🔴", zone: rocky }, { id: saturn, label: Saturn, emoji: "💍", zone: giant }, { id: uranus, label: Uranus, emoji: "🧊", zone: giant } ] }, feedback: { correctSay: pr-io-rocky-giant-ok, hintSay: pr-io-rocky-giant-hint } }
      - { station: gas-giants, band: 6, kind: compare-strength, say: pr-gg-biggest, prompt: "Tap the biggest planet.", target: { id: jupiter, items: [ { id: earth, label: Earth, emoji: "🌍", size: 48 }, { id: jupiter, label: Jupiter, emoji: "🪐", size: 98 }, { id: neptune, label: Neptune, emoji: "🔵", size: 64 } ] }, feedback: { correctSay: pr-gg-biggest-ok, hintSay: pr-gg-biggest-hint } }
      - { station: gas-giants, band: 6, kind: tap-hotspot, say: pr-gg-rings, prompt: "Tap Saturn's rings.", target: { id: rings, items: [ { id: storm, label: "Jupiter storm", emoji: "🌀", x: 35, y: 46 }, { id: rings, label: "Saturn rings", emoji: "💍", x: 62, y: 42 }, { id: ice, label: "Ice giant", emoji: "🧊", x: 73, y: 66 } ] }, feedback: { correctSay: pr-gg-rings-ok, hintSay: pr-gg-rings-hint } }
      - { station: moons-rings, band: 7, kind: sort-zones, say: pr-mr-sort, prompt: "Sort moons and ring pieces into the right orbit groups.", target: { zones: [ { id: moon, label: "Moon", emoji: "🌙", hint: "One larger world" }, { id: ring, label: "Ring pieces", emoji: "💍", hint: "Many small chunks" } ], tokens: [ { id: luna, label: "Large moon", emoji: "🌙", zone: moon }, { id: titan, label: Titan, emoji: "🟠", zone: moon }, { id: ice, label: "Icy chunk", emoji: "🧊", zone: ring }, { id: dust, label: Dust, emoji: "✨", zone: ring } ] }, feedback: { correctSay: pr-mr-sort-ok, hintSay: pr-mr-sort-hint } }
      - { station: moons-rings, band: 7, kind: tap-hotspot, say: pr-mr-gravity, prompt: "Tap what keeps moons and ring pieces looping around a planet.", target: { id: gravity, items: [ { id: gravity, label: Gravity, emoji: "⬇️", x: 50, y: 42 }, { id: wind, label: Wind, emoji: "💨", x: 30, y: 65 }, { id: fire, label: Fire, emoji: "🔥", x: 70, y: 65 } ] }, feedback: { correctSay: pr-mr-gravity-ok, hintSay: pr-mr-gravity-hint } }
      - { station: asteroids-comets, band: 8, kind: sort-zones, say: pr-ac-sort, prompt: "Sort each small body as rocky asteroid or icy comet.", target: { zones: [ { id: asteroid, label: Asteroid, emoji: "🪨", hint: "Mostly rock" }, { id: comet, label: Comet, emoji: "☄️", hint: "Ice and dust" } ], tokens: [ { id: belt-rock, label: "Belt rock", emoji: "🪨", zone: asteroid }, { id: crater-rock, label: "Cratered rock", emoji: "🟤", zone: asteroid }, { id: tail, label: "Glowing tail", emoji: "☄️", zone: comet }, { id: snowball, label: "Dusty snowball", emoji: "❄️", zone: comet } ] }, feedback: { correctSay: pr-ac-sort-ok, hintSay: pr-ac-sort-hint } }
      - { station: asteroids-comets, band: 8, kind: tap-hotspot, say: pr-ac-belt, prompt: "Tap where most asteroids travel.", target: { id: belt, items: [ { id: sun, label: Sun, emoji: "☀️", x: 25, y: 50 }, { id: belt, label: "Asteroid belt", emoji: "🪨", x: 55, y: 44 }, { id: neptune, label: Neptune, emoji: "🔵", x: 76, y: 63 } ] }, feedback: { correctSay: pr-ac-belt-ok, hintSay: pr-ac-belt-hint } }
      - { station: whole-system, band: 9, kind: order-line, say: pr-ws-order, prompt: "Arrange the planets from closest to farthest from the Sun.", target: { order: [ mercury, venus, earth, mars, jupiter, saturn, uranus, neptune ], items: [ { id: mercury, label: Mercury, emoji: "☿️" }, { id: venus, label: Venus, emoji: "🟡" }, { id: earth, label: Earth, emoji: "🌍" }, { id: mars, label: Mars, emoji: "🔴" }, { id: jupiter, label: Jupiter, emoji: "🪐" }, { id: saturn, label: Saturn, emoji: "💍" }, { id: uranus, label: Uranus, emoji: "🧊" }, { id: neptune, label: Neptune, emoji: "🔵" } ] }, feedback: { correctSay: pr-ws-order-ok, hintSay: pr-ws-order-hint } }
      - { station: whole-system, band: 9, kind: order-line, say: pr-ws-inner-outer, prompt: "Arrange this mini Solar System from inside to outside.", target: { order: [ mercury, earth, jupiter, neptune ], items: [ { id: mercury, label: Mercury, emoji: "☿️" }, { id: earth, label: Earth, emoji: "🌍" }, { id: jupiter, label: Jupiter, emoji: "🪐" }, { id: neptune, label: Neptune, emoji: "🔵" } ] }, feedback: { correctSay: pr-ws-inner-outer-ok, hintSay: pr-ws-inner-outer-hint } }
      # ── Deep Space ──
      - { station: constellations, band: 10, kind: connect-stars, say: pr-cn-connect, prompt: "Connect the stars to make a constellation pattern.", target: { order: [ a, b, c, d ], stars: [ { id: a, x: 24, y: 68 }, { id: b, x: 42, y: 42 }, { id: c, x: 62, y: 58 }, { id: d, x: 78, y: 30 } ] }, feedback: { correctSay: pr-cn-connect-ok, hintSay: pr-cn-connect-hint } }
      - { station: constellations, band: 10, kind: tap-hotspot, say: pr-cn-guide, prompt: "Tap the sky clue travelers used to find their way.", target: { id: guide, items: [ { id: picture, label: Picture, emoji: "✨", x: 32, y: 45 }, { id: guide, label: Guide star, emoji: "🧭", x: 58, y: 38 }, { id: season, label: Season, emoji: "🍂", x: 72, y: 64 } ] }, feedback: { correctSay: pr-cn-guide-ok, hintSay: pr-cn-guide-hint } }
      - { station: star-life, band: 11, kind: order-line, say: pr-sl-order, prompt: "Arrange the life of a massive star from birth to explosion.", target: { order: [ nebula, newstar, giant, supernova ], items: [ { id: nebula, label: Nebula, emoji: "☁️" }, { id: newstar, label: "New star", emoji: "⭐" }, { id: giant, label: "Red giant", emoji: "🔴" }, { id: supernova, label: Supernova, emoji: "💥" } ] }, feedback: { correctSay: pr-sl-order-ok, hintSay: pr-sl-order-hint } }
      - { station: star-life, band: 11, kind: tap-hotspot, say: pr-sl-birth, prompt: "Tap where stars are born.", target: { id: nebula, items: [ { id: nebula, label: Nebula, emoji: "☁️", x: 36, y: 46 }, { id: planet, label: Planet, emoji: "🌍", x: 62, y: 42 }, { id: asteroid, label: Asteroid, emoji: "🪨", x: 72, y: 66 } ] }, feedback: { correctSay: pr-sl-birth-ok, hintSay: pr-sl-birth-hint } }
      - { station: nebulae, band: 12, kind: tap-hotspot, say: pr-ne-stars, prompt: "Tap the place where new stars can begin inside a nebula.", target: { id: stars, items: [ { id: gas, label: Gas, emoji: "💨", x: 30, y: 50 }, { id: dust, label: Dust, emoji: "✨", x: 55, y: 38 }, { id: stars, label: "New stars", emoji: "⭐", x: 70, y: 62 } ] }, feedback: { correctSay: pr-ne-stars-ok, hintSay: pr-ne-stars-hint } }
      - { station: nebulae, band: 12, kind: sort-zones, say: pr-ne-sort, prompt: "Sort what belongs inside a nebula.", target: { zones: [ { id: nebula, label: Nebula stuff, emoji: "☁️", hint: "Gas, dust, baby stars" }, { id: not, label: Not nebula stuff, emoji: "🚫", hint: "Objects that do not make the cloud" } ], tokens: [ { id: gas, label: Gas, emoji: "💨", zone: nebula }, { id: dust, label: Dust, emoji: "✨", zone: nebula }, { id: baby-star, label: "Baby star", emoji: "⭐", zone: nebula }, { id: rocket, label: Rocket, emoji: "🚀", zone: not } ] }, feedback: { correctSay: pr-ne-sort-ok, hintSay: pr-ne-sort-hint } }
      - { station: galaxies, band: 13, kind: tap-hotspot, say: pr-ga-home, prompt: "Tap our home galaxy.", target: { id: milky, items: [ { id: milky, label: "Milky Way", emoji: "🌌", x: 42, y: 48 }, { id: sun, label: Sun, emoji: "☀️", x: 68, y: 38 }, { id: planet, label: Planet, emoji: "🌍", x: 72, y: 66 } ] }, feedback: { correctSay: pr-ga-home-ok, hintSay: pr-ga-home-hint } }
      - { station: galaxies, band: 13, kind: sort-zones, say: pr-ga-scale, prompt: "Sort the space objects from small family to huge family.", target: { zones: [ { id: star, label: Single star, emoji: "⭐", hint: "One star" }, { id: galaxy, label: Galaxy, emoji: "🌌", hint: "Billions of stars" } ], tokens: [ { id: sun, label: Sun, emoji: "☀️", zone: star }, { id: milky, label: "Milky Way", emoji: "🌌", zone: galaxy }, { id: andromeda, label: Andromeda, emoji: "🌌", zone: galaxy }, { id: sirius, label: Sirius, emoji: "⭐", zone: star } ] }, feedback: { correctSay: pr-ga-scale-ok, hintSay: pr-ga-scale-hint } }
      - { station: black-holes, band: 14, kind: tap-hotspot, say: pr-bh-light, prompt: "Tap the clue that shows black holes can bend light.", target: { id: light, items: [ { id: light, label: "Bent light", emoji: "〰️", x: 32, y: 42 }, { id: sound, label: Sound, emoji: "🔊", x: 58, y: 38 }, { id: cloud, label: Cloud, emoji: "☁️", x: 74, y: 64 } ] }, feedback: { correctSay: pr-bh-light-ok, hintSay: pr-bh-light-hint } }
      - { station: black-holes, band: 14, kind: tap-hotspot, say: pr-bh-tug, prompt: "Tap the clue that reveals something invisible tugging on a star.", target: { id: tug, items: [ { id: gas, label: "Hot gas", emoji: "🔥", x: 30, y: 50 }, { id: tug, label: "Star tug", emoji: "⭐", x: 58, y: 42 }, { id: ice, label: Ice, emoji: "🧊", x: 74, y: 66 } ] }, feedback: { correctSay: pr-bh-tug-ok, hintSay: pr-bh-tug-hint } }
      # ── The Human Element ──
      - { station: life-in-orbit, band: 15, kind: tap-hotspot, say: pr-lo-freefall, prompt: "Tap why astronauts float on the space station.", target: { id: freefall, items: [ { id: freefall, label: Free-fall, emoji: "🛰️", x: 38, y: 45 }, { id: no-gravity, label: "No gravity", emoji: "🚫", x: 62, y: 38 }, { id: magnets, label: Magnets, emoji: "🧲", x: 72, y: 66 } ] }, feedback: { correctSay: pr-lo-freefall-ok, hintSay: pr-lo-freefall-hint } }
      - { station: life-in-orbit, band: 15, kind: sort-zones, say: pr-lo-day, prompt: "Sort ISS activities into body care or science work.", target: { zones: [ { id: body, label: Body care, emoji: "💪", hint: "Keeping astronauts healthy" }, { id: science, label: Science, emoji: "🔬", hint: "Experiments in microgravity" } ], tokens: [ { id: exercise, label: Exercise, emoji: "🏃", zone: body }, { id: sleep, label: Sleep, emoji: "😴", zone: body }, { id: experiment, label: Experiment, emoji: "🧪", zone: science }, { id: plants, label: "Plant study", emoji: "🌱", zone: science } ] }, feedback: { correctSay: pr-lo-day-ok, hintSay: pr-lo-day-hint } }
