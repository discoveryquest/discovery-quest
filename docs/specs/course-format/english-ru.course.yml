course:
  formatVersion: 1
  id: english-ru
  title: Учим английский
  subject: English
  companion: luna
  voice:
    id: jessica
    profile: teaching-slow
  engine: ">=1.0"
  lowercase: true
  ui:
    done: Молодец!
    backToMap: На карту
    score: "Ты ответил правильно {correct} из {total}!"
  reactions:
    praise: [praise-0, praise-1, praise-2, praise-3, praise-4, praise-5]
    oops: [oops-0, oops-1, oops-2]
    solved: [solved-0, solved-1]
  worlds:
    - id: animals
      title: Животные
      emoji: 🐾
      color: "#4ADE80"
      blurb: Учим названия животных по-английски.
      stations:
        - id: a-pic
          title: Слово и картинка
          icon: 🖼️
          sub: найди слово к картинке
          board: pictureMatch
          bands:
            - 0
          lesson: animals-picture
        - id: a-listen
          title: Слушай и выбери
          icon: 👂
          sub: послушай и выбери слово
          board: vocabListen
          bands:
            - 0
          lesson: animals-listen
