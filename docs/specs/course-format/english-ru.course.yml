  lessons:
    animals-picture:
      title: Слово и картинка
      sections:
        - id: learn
          label: Учимся
          beats:
            - say: la-pic-1
              caption: Давай выучим животных по-английски! Смотри на картинку и слушай слово.
              view: { kind: picture, key: animals, emoji: 🐾, word: animals }
            - say: la-pic-2
              caption: "Это кошка. По-английски — cat. Послушай: cat."
              view: { kind: picture, key: cat, emoji: 🐱, word: cat }
            - say: la-pic-3
              caption: "Это собака. По-английски — dog. Послушай: dog."
              view: { kind: picture, key: dog, emoji: 🐶, word: dog }
        - id: go
          label: Твой ход
          beats:
            - say: la-pic-4
              caption: Теперь ты! Посмотри на картинку и нажми нужное слово. Попробуй!
              view: { kind: picture, key: fish, emoji: 🐟, word: fish }
    animals-listen:
      title: Слушай и выбери
      sections:
        - id: learn
          label: Слушаем
          beats:
            - say: la-listen-1
              caption: А теперь будем слушать! Я скажу слово по-английски, а ты его выбери.
              view: { kind: picture, key: listen, emoji: 👂, word: listen }
            - say: la-listen-2
              caption: Например, рыба — это fish. Нажми на слово, которое услышал.
              view: { kind: picture, key: fish, emoji: 🐟, word: fish }
        - id: go
          label: Твой ход
          beats:
            - say: la-listen-3
              caption: Готов? Слушай внимательно и выбирай. Попробуй!
              view: { kind: picture, key: duck, emoji: 🦆, word: duck }
