        - id: f-pic
          title: Слово и картинка
          icon: 🖼️
          sub: найди слово к картинке
          board: pictureMatch
          bands:
            - 1
          lesson: food
        - id: f-listen
          title: Слушай и выбери
          icon: 👂
          sub: послушай и выбери слово
          board: vocabListen
          bands:
            - 1
          lesson: food
