  lessons:
    counting:
      title: Counting
      sections:
        - id: what
          label: What counting is
          beats:
            - say: lcount-intro
              caption: Counting is how we find out how many. Let's count these apples together!
              view:
                kind: objects
                key: apples
                emoji: 🍎
                "n": 5
                highlight: -1
        - id: count5
          label: Count to 5
          beats:
            - say: lc-1
              caption: One.
              view:
                kind: objects
                key: apples
                emoji: 🍎
                "n": 5
                highlight: 0
            - say: lc-2
              caption: Two.
              view:
                kind: objects
                key: apples
                emoji: 🍎
                "n": 5
                highlight: 1
            - say: lc-3
              caption: Three.
              view:
                kind: objects
                key: apples
                emoji: 🍎
                "n": 5
                highlight: 2
            - say: lc-4
              caption: Four.
              view:
                kind: objects
                key: apples
                emoji: 🍎
                "n": 5
                highlight: 3
            - say: lc-5
              caption: Five!
              view:
                kind: objects
                key: apples
                emoji: 🍎
                "n": 5
                highlight: 4
        - id: idea
          label: How many?
          beats:
            - say: lcount-howmany
              caption: The last number we say tells us how many. There are five apples!
              view:
                kind: objects
                key: apples
                emoji: 🍎
                "n": 5
                highlight: 4
                numeral: 5
        - id: again
          label: Try again
          beats:
            - say: lcount-again
              caption: Let's try again. Count these stars.
              view:
                kind: objects
                key: stars
                emoji: ⭐
                "n": 3
                highlight: -1
            - say: lc-1
              caption: One.
              view:
                kind: objects
                key: stars
                emoji: ⭐
                "n": 3
                highlight: 0
            - say: lc-2
              caption: Two.
              view:
                kind: objects
                key: stars
                emoji: ⭐
                "n": 3
                highlight: 1
            - say: lc-3
              caption: Three.
              view:
                kind: objects
                key: stars
                emoji: ⭐
                "n": 3
                highlight: 2
            - say: lcount-three
              caption: Three stars! Count each one, and the last number is how many.
              view:
                kind: objects
                key: stars
                emoji: ⭐
                "n": 3
                highlight: 2
                numeral: 3
        - id: go
          label: Your turn
          beats:
            - say: lcount-star
              caption: You're a counting star! Tap Play and count some yourself.
              view:
                kind: objects
                key: go
                emoji: 🌟
                "n": 5
                highlight: 4
    compare:
      title: Bigger or Smaller
      sections:
        - id: intro
          label: Compare
          beats:
            - say: lcmp-1
              caption: Sometimes we want to know which group has more. Let's compare two plates of cookies!
              view:
                kind: compare
                key: cookies
                emoji: 🍪
                left: 3
                right: 5
            - say: lcmp-2
              caption: This plate has three cookies. This one has five.
              view:
                kind: compare
                key: cookies
                emoji: 🍪
                left: 3
                right: 5
            - say: lcmp-3
              caption: Five is more than three — see how this side is taller?
              view:
                kind: compare
                key: cookies
                emoji: 🍪
                left: 3
                right: 5
        - id: sign
          label: The sign
          beats:
            - say: lcmp-4
              caption: >-
                We show it with this sign. Think of it as a hungry mouth that always opens to eat
                the bigger number. Chomp!
              view:
                kind: compare
                key: cookies
                emoji: 🍪
                left: 3
                right: 5
                sign: <
            - say: lcmp-5
              caption: So three is less than five.
              view:
                kind: compare
                key: cookies
                emoji: 🍪
                left: 3
                right: 5
                sign: <
        - id: equal
          label: Equal
          beats:
            - say: lcmp-6
              caption: What if both sides are the same? Here are four and four.
              view:
                kind: compare
                key: apples
                emoji: 🍎
                left: 4
                right: 4
            - say: lcmp-7
              caption: When they match, we use the equals sign.
              view:
                kind: compare
                key: apples
                emoji: 🍎
                left: 4
                right: 4
                sign: "="
        - id: other
          label: Other way
          beats:
            - say: lcmp-8
              caption: And here, six is more than two, so the mouth opens the other way.
              view:
                kind: compare
                key: berries
                emoji: 🫐
                left: 6
                right: 2
                sign: ">"
        - id: go
          label: Your turn
          beats:
            - say: lcmp-9
              caption: "Remember: the open mouth always points at the bigger number. Now you try!"
              view:
                kind: compare
                key: berries
                emoji: 🫐
                left: 6
                right: 2
                sign: ">"
    bonds:
      title: Friends of 10
      sections:
        - id: what
          label: Ten-frame
          beats:
            - say: lbnd-1
              caption: >-
                Friends of ten are two numbers that add up to exactly ten. Here is a ten-frame — ten
                little boxes.
              view:
                kind: tenframe
                key: tf0
                filled: 0
                showEq: false
        - id: six
          label: Six
          beats:
            - say: lbnd-2
              caption: Let's drop in six counters.
              view:
                kind: tenframe
                key: tf6
                filled: 6
            - say: lbnd-3
              caption: "Now count the empty boxes: one, two, three, four. Four are left!"
              view:
                kind: tenframe
                key: tf6
                filled: 6
            - say: lbnd-4
              caption: Six and four make ten. They are friends of ten!
              view:
                kind: tenframe
                key: tf6
                filled: 6
        - id: seven
          label: Seven
          beats:
            - say: lbnd-5
              caption: Let's find another pair. This time we put in seven.
              view:
                kind: tenframe
                key: tf7
                filled: 7
            - say: lbnd-6
              caption: Three empty boxes. So seven and three make ten too.
              view:
                kind: tenframe
                key: tf7
                filled: 7
        - id: two
          label: Two
          beats:
            - say: lbnd-7
              caption: One more — just two counters.
              view:
                kind: tenframe
                key: tf2
                filled: 2
            - say: lbnd-8
              caption: Eight empty boxes. Two and eight are friends of ten!
              view:
                kind: tenframe
                key: tf2
                filled: 2
        - id: go
          label: Your turn
          beats:
            - say: lbnd-9
              caption: Every pair that fills the whole frame is a friend of ten. Now you try!
              view:
                kind: tenframe
                key: tf10
                filled: 10
                showEq: false
    addition:
      title: Adding to 20
      sections:
        - id: together
          label: Put together
          beats:
            - say: ladd-1
              caption: Adding means putting groups together to find how many there are in all.
              view:
                kind: combine
                key: c43
                a: 4
                b: 3
            - say: ladd-2
              caption: Four blocks and three blocks, pushed together, make seven.
              view:
                kind: combine
                key: c43
                a: 4
                b: 3
        - id: bigger
          label: A bigger one
          beats:
            - say: ladd-3
              caption: "Let's try a bigger one: eight blocks and five blocks."
              view:
                kind: combine
                key: c85
                a: 8
                b: 5
            - say: ladd-4
              caption: Altogether that is thirteen.
              view:
                kind: combine
                key: c85
                a: 8
                b: 5
        - id: counton
          label: Count on
          beats:
            - say: ladd-5
              caption: There is another way — counting on. Start at nine and hop up four.
              view:
                kind: numberline
                key: nl
                hint:
                  kind: numberline
                  start: 9
                  op: add
                  delta: 4
            - say: ladd-6
              caption: Ten, eleven, twelve, thirteen. Nine plus four is thirteen!
              view:
                kind: numberline
                key: nl
                hint:
                  kind: numberline
                  start: 9
                  op: add
                  delta: 4
        - id: go
          label: Your turn
          beats:
            - say: ladd-7
              caption: Put together, or count on — both find the total. Your turn!
              view:
                kind: big
                key: plus
                text: ➕
                color: "#22d3ee"
    subtraction:
      title: Taking Away
      sections:
        - id: takeaway
          label: Take away
          beats:
            - say: lsub-1
              caption: Subtracting means taking some away and seeing what is left.
              view:
                kind: takeaway
                key: t83
                a: 8
                b: 3
            - say: lsub-2
              caption: Eight blocks, take away three, and five are left.
              view:
                kind: takeaway
                key: t83
                a: 8
                b: 3
        - id: another
          label: Another
          beats:
            - say: lsub-3
              caption: "Another one: ten blocks, take away four."
              view:
                kind: takeaway
                key: t104
                a: 10
                b: 4
            - say: lsub-4
              caption: Six are left. Ten minus four is six.
              view:
                kind: takeaway
                key: t104
                a: 10
                b: 4
        - id: hopback
          label: Hop back
          beats:
            - say: lsub-5
              caption: We can also hop backward. Start at twelve and hop back five.
              view:
                kind: numberline
                key: nl
                hint:
                  kind: numberline
                  start: 12
                  op: sub
                  delta: 5
            - say: lsub-6
              caption: Eleven, ten, nine, eight, seven. Twelve minus five is seven!
              view:
                kind: numberline
                key: nl
                hint:
                  kind: numberline
                  start: 12
                  op: sub
                  delta: 5
        - id: go
          label: Your turn
          beats:
            - say: lsub-7
              caption: Take away, or hop back — both show what is left. You try!
              view:
                kind: big
                key: minus
                text: ➖
                color: "#fb923c"
    place-value:
      title: Tens & Ones
      sections:
        - id: build
          label: Build 23
          beats:
            - say: lpv-1
              caption: Big numbers are built from tens and ones. Let's build twenty-three.
              view:
                kind: baseten
                key: bt23
                t: 2
                o: 3
            - say: lpv-2
              caption: Two tall ten-rods make twenty, and three little ones make three.
              view:
                kind: baseten
                key: bt23
                t: 2
                o: 3
            - say: lpv-3
              caption: Two tens and three ones — that's twenty-three!
              view:
                kind: baseten
                key: bt23
                t: 2
                o: 3
        - id: forty
          label: Forty
          beats:
            - say: lpv-4
              caption: Let's build forty. Four ten-rods, and no ones at all.
              view:
                kind: baseten
                key: bt40
                t: 4
                o: 0
            - say: lpv-5
              caption: Four tens is forty.
              view:
                kind: baseten
                key: bt40
                t: 4
                o: 0
        - id: seven
          label: Just ones
          beats:
            - say: lpv-6
              caption: And the number seven is just seven ones — no tens yet.
              view:
                kind: baseten
                key: bt7
                t: 0
                o: 7
        - id: go
          label: Your turn
          beats:
            - say: lpv-7
              caption: The left digit counts the tens, the right digit counts the ones. Now you try!
              view:
                kind: baseten
                key: bt35
                t: 3
                o: 5
    hundreds:
      title: Hundreds
      sections:
        - id: bundle
          label: Make 100
          beats:
            - say: lhun-1
              caption: When we gather ten ten-rods together, they bundle into one hundred.
              view:
                kind: baseten
                key: bt100
                t: 10
                o: 0
        - id: read
          label: Read 345
          beats:
            - say: lhun-2
              caption: >-
                Big numbers have three places: hundreds, tens, and ones. Here is three hundred
                forty-five.
              view:
                kind: placedigits
                key: pd345
                value: 345
            - say: lhun-3
              caption: >-
                The three means three hundreds, the four means four tens, and the five means five
                ones.
              view:
                kind: placedigits
                key: pd345
                value: 345
            - say: lhun-4
              caption: Three hundred, plus forty, plus five, makes three hundred forty-five.
              view:
                kind: placedigits
                key: pd345
                value: 345
        - id: zero
          label: Zero holder
          beats:
            - say: lhun-5
              caption: >-
                Now read two hundred eight. Two hundreds, zero tens, and eight ones. The zero holds
                the tens place open.
              view:
                kind: placedigits
                key: pd208
                value: 208
        - id: go
          label: Your turn
          beats:
            - say: lhun-6
              caption: Each place is ten times bigger than the one to its right. Now you try!
              view:
                kind: placedigits
                key: pd345b
                value: 345
    skip-counting:
      title: Skip Counting
      sections:
        - id: fives
          label: By 5s
          beats:
            - say: lskip-1
              caption: Skip counting means hopping by the same amount each time. Let's hop by fives.
              view:
                kind: skip
                key: s5
                step: 5
                count: 4
            - say: lskip-2
              caption: Five, ten, fifteen, twenty! Much faster than counting by ones.
              view:
                kind: skip
                key: s5
                step: 5
                count: 4
        - id: twos
          label: By 2s
          beats:
            - say: lskip-3
              caption: Now we hop by twos.
              view:
                kind: skip
                key: s2
                step: 2
                count: 5
            - say: lskip-4
              caption: Two, four, six, eight, ten.
              view:
                kind: skip
                key: s2
                step: 2
                count: 5
        - id: tens
          label: By 10s
          beats:
            - say: lskip-5
              caption: And by tens — the longest hops of all.
              view:
                kind: skip
                key: s10
                step: 10
                count: 5
            - say: lskip-6
              caption: Ten, twenty, thirty, forty, fifty!
              view:
                kind: skip
                key: s10
                step: 10
                count: 5
        - id: go
          label: Your turn
          beats:
            - say: lskip-7
              caption: >-
                Skip counting helps you count fast — and it gets you ready for times tables. You
                try!
              view:
                kind: skip
                key: s5b
                step: 5
                count: 4
    even-odd:
      title: Even or Odd
      sections:
        - id: even8
          label: Even
          beats:
            - say: leo-1
              caption: A number is even if it splits into perfect pairs, with none left over.
              view:
                kind: evenodd
                key: e8
                "n": 8
            - say: leo-2
              caption: Eight splits into four pairs — even!
              view:
                kind: evenodd
                key: e8
                "n": 8
        - id: odd7
          label: Odd
          beats:
            - say: leo-3
              caption: But seven leaves one little dot all alone.
              view:
                kind: evenodd
                key: e7
                "n": 7
            - say: leo-4
              caption: Seven is odd — one left over.
              view:
                kind: evenodd
                key: e7
                "n": 7
        - id: even6
          label: Even again
          beats:
            - say: leo-5
              caption: Six makes three pairs with none left — so six is even.
              view:
                kind: evenodd
                key: e6
                "n": 6
        - id: go
          label: Your turn
          beats:
            - say: leo-6
              caption: >-
                A quick trick: even numbers end in 0, 2, 4, 6, or 8. Odd ones end in 1, 3, 5, 7, or
                9. You try!
              view:
                kind: evenodd
                key: e6b
                "n": 6
    long-add:
      title: Long Addition
      sections:
        - id: lineup
          label: Stack them
          beats:
            - say: lla-1
              caption: For bigger numbers, we stack them — ones under ones, tens under tens.
              view:
                kind: column
                key: a1
                op: +
                result: ""
                carry: {}
                active: null
                top: 34
                bottom: 12
        - id: nocarry
          label: Add columns
          beats:
            - say: lla-2
              caption: Always start on the right, with the ones. Four plus two is six.
              view:
                kind: column
                key: a1
                op: +
                result: "6"
                carry: {}
                active: 0
                top: 34
                bottom: 12
            - say: lla-3
              caption: Then the tens. Three plus one is four.
              view:
                kind: column
                key: a1
                op: +
                result: "46"
                carry: {}
                active: 1
                top: 34
                bottom: 12
            - say: lla-4
              caption: Thirty-four plus twelve is forty-six!
              view:
                kind: column
                key: a1
                op: +
                result: "46"
                carry: {}
                active: null
                top: 34
                bottom: 12
        - id: carry
          label: Carrying
          beats:
            - say: lla-5
              caption: >-
                Now, what if the ones add up to ten or more? Let's try twenty-seven plus
                forty-eight.
              view:
                kind: column
                key: a2
                op: +
                result: ""
                carry: {}
                active: null
                top: 27
                bottom: 48
            - say: lla-6
              caption: >-
                Seven plus eight is fifteen. Fifteen is too big for one box, so we write the five
                and carry the one ten up to the tens column.
              view:
                kind: column
                key: a2
                op: +
                result: "5"
                carry:
                  "1": "1"
                active: 0
                top: 27
                bottom: 48
            - say: lla-7
              caption: "Now the tens: the carried one, plus two, plus four, makes seven."
              view:
                kind: column
                key: a2
                op: +
                result: "75"
                carry:
                  "1": "1"
                active: 1
                top: 27
                bottom: 48
            - say: lla-8
              caption: Twenty-seven plus forty-eight is seventy-five!
              view:
                kind: column
                key: a2
                op: +
                result: "75"
                carry:
                  "1": "1"
                active: null
                top: 27
                bottom: 48
        - id: go
          label: Your turn
          beats:
            - say: lla-9
              caption: Line up the digits, add each column, and carry whenever you reach ten. You try!
              view:
                kind: column
                key: a2
                op: +
                result: "75"
                carry:
                  "1": "1"
                active: null
                top: 27
                bottom: 48
    long-sub:
      title: Long Subtraction
      sections:
        - id: lineup
          label: Stack them
          beats:
            - say: lls-1
              caption: We stack subtraction the same way — ones under ones — and start on the right.
              view:
                kind: column
                key: s1
                op: −
                result: ""
                carry: {}
                active: null
                top: 48
                bottom: 23
        - id: noborrow
          label: Subtract
          beats:
            - say: lls-2
              caption: Eight minus three is five.
              view:
                kind: column
                key: s1
                op: −
                result: "5"
                carry: {}
                active: 0
                top: 48
                bottom: 23
            - say: lls-3
              caption: "Then the tens: four minus two is two."
              view:
                kind: column
                key: s1
                op: −
                result: "25"
                carry: {}
                active: 1
                top: 48
                bottom: 23
            - say: lls-4
              caption: Forty-eight minus twenty-three is twenty-five.
              view:
                kind: column
                key: s1
                op: −
                result: "25"
                carry: {}
                active: null
                top: 48
                bottom: 23
        - id: borrow
          label: Borrowing
          beats:
            - say: lls-5
              caption: Sometimes the top digit is too small. Try fifty-two minus twenty-seven.
              view:
                kind: column
                key: s2
                op: −
                result: ""
                carry: {}
                active: null
                top: 52
                bottom: 27
            - say: lls-6
              caption: >-
                Two minus seven? We can't do that, so we borrow. We take one ten from the five, so
                it becomes four, and the two ones become twelve.
              view:
                kind: column
                key: s2
                op: −
                result: ""
                carry:
                  "0": "12"
                  "1": "4"
                active: 0
                top: 52
                bottom: 27
            - say: lls-7
              caption: Now twelve minus seven is five.
              view:
                kind: column
                key: s2
                op: −
                result: "5"
                carry:
                  "0": "12"
                  "1": "4"
                active: 0
                top: 52
                bottom: 27
            - say: lls-8
              caption: And four minus two is two.
              view:
                kind: column
                key: s2
                op: −
                result: "25"
                carry:
                  "0": "12"
                  "1": "4"
                active: 1
                top: 52
                bottom: 27
        - id: go
          label: Your turn
          beats:
            - say: lls-9
              caption: >-
                Fifty-two minus twenty-seven is twenty-five! Borrow whenever the top digit is too
                small. You try!
              view:
                kind: column
                key: s2
                op: −
                result: "25"
                carry:
                  "0": "12"
                  "1": "4"
                active: null
                top: 52
                bottom: 27
    rounding:
      title: Rounding
      sections:
        - id: what
          label: Round numbers
          beats:
            - say: lrnd-1
              caption: >-
                A round number ends in zero — like ten, twenty, thirty. They are nice and tidy to
                work with.
              view:
                kind: big
                key: rn
                text: 10  20  30  40
                color: "#22d3ee"
        - id: up
          label: Round up
          beats:
            - say: lrnd-2
              caption: >-
                Rounding finds the nearest round number. Is forty-seven closer to forty, or to
                fifty?
              view:
                kind: roundline
                key: r47
                v: 47
                unit: 10
            - say: lrnd-3
              caption: Forty-seven is past the middle, so it rounds up to fifty.
              view:
                kind: roundline
                key: r47
                v: 47
                unit: 10
        - id: down
          label: Round down
          beats:
            - say: lrnd-4
              caption: Now forty-three. It sits below the middle, so it rounds down to forty.
              view:
                kind: roundline
                key: r43
                v: 43
                unit: 10
        - id: half
          label: Halfway
          beats:
            - say: lrnd-5
              caption: >-
                And exactly halfway, like forty-five? The rule is: halfway always rounds up — to
                fifty.
              view:
                kind: roundline
                key: r45
                v: 45
                unit: 10
        - id: go
          label: Your turn
          beats:
            - say: lrnd-6
              caption: "Look at the ones digit: five or more rounds up, less than five rounds down. You try!"
              view:
                kind: roundline
                key: r47b
                v: 47
                unit: 10
    word-problems:
      title: Story Problems
      sections:
        - id: readA
          label: Read it
          beats:
            - say: lwp-1
              caption: Story problems hide math inside words. Maya has three apples.
              view:
                kind: story
                key: wA
                words:
                  - t: Maya
                  - t: has
                  - t: "3"
                    kind: num
                  - t: apples.
                  - t: She
                  - t: gets
                  - t: "5"
                    kind: num
                  - t: more.
                    kind: add
                  - t: How
                  - t: many
                  - t: now?
                revealed: 4
            - say: lwp-2
              caption: She gets five more.
              view:
                kind: story
                key: wA
                words:
                  - t: Maya
                  - t: has
                  - t: "3"
                    kind: num
                  - t: apples.
                  - t: She
                  - t: gets
                  - t: "5"
                    kind: num
                  - t: more.
                    kind: add
                  - t: How
                  - t: many
                  - t: now?
                revealed: 8
            - say: lwp-3
              caption: How many apples does she have now?
              view:
                kind: story
                key: wA
                words:
                  - t: Maya
                  - t: has
                  - t: "3"
                    kind: num
                  - t: apples.
                  - t: She
