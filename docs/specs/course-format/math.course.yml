                color: "#fb923c"
        - id: go
          label: Your turn
          beats:
            - say: lwp-10
              caption: Read slowly, find the numbers, and look for the action word. You try!
              view:
                kind: story
                key: wB
                words:
                  - t: Sam
                  - t: had
                  - t: "8"
                    kind: num
                  - t: stickers.
                  - t: He
                  - t: gave
                    kind: sub
                  - t: away
                    kind: sub
                  - t: "3."
