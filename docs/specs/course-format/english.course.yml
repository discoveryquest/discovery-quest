course:
  formatVersion: 1
  id: english
  title: English Quest
  subject: English
  companion: luna
  voice:
    id: jessica
    profile: teaching-slow
  ui:
    done: "Great job!"
    backToMap: "Back to the map"
    score: "You got {correct} of {total}!"
  reactions:
    praise:
      - praise-0
      - praise-1
      - praise-2
      - praise-3
      - praise-4
      - praise-5
    oops:
      - oops-0
      - oops-1
      - oops-2
    solved:
      - solved-0
      - solved-1
  engine: ">=1.0"
  worlds:
    - id: phonics
      title: Phonics Cove
      emoji: 🐚
      color: "#22D3EE"
      blurb: Hear it, find the letter, read your first words.
      stations:
        - id: ph-set1
          title: First Sounds
          icon: 🅰️
          sub: s a t p i n
          board: soundToLetter
          bands:
            - 0
          lesson: letter-sounds
        - id: ph-set2
          title: More Sounds
          icon: 🅱️
          sub: + m d g o c k
          board: soundToLetter
          bands:
            - 0
            - 1
          lesson: letter-sounds
        - id: ph-all
          title: All Letter Sounds
          icon: 🔤
          sub: every letter
          board: soundToLetter
          bands:
            - 0
            - 1
            - 2
          lesson: letter-sounds
        - id: ph-blend
          title: Blending Bay
          icon: 🫧
          sub: blend sounds into words
          board: blendWord
          bands:
            - 0
          lesson: blending
        - id: ph-families
          title: Word Families
          icon: 👨‍👩‍👧
          sub: "-at, -an, -ig"
          board: wordFamily
          bands:
            - 0
          lesson: word-families
        - id: ph-digraphs
          title: Tricky Teams
          icon: 🧩
          sub: sh, ch, th, ck
          board: digraphs
          bands:
            - 0
          lesson: digraphs
    - id: vocab
      title: Word Woods
      emoji: 🌳
      color: "#4ADE80"
      blurb: Grow your word power — meanings, matches, and clues.
      stations:
        - id: v-match
          title: Picture Match
          icon: 🖼️
          sub: word ↔ picture
          board: pictureMatch
          bands:
            - 0
          lesson: picture-match
        - id: v-sight
          title: Sight Words
          icon: 👀
          sub: the, and, is, you…
          board: sightWord
          bands:
            - 0
          lesson: sight-words
        - id: v-synant
          title: Same or Opposite
          icon: 🔁
          sub: synonyms & antonyms
          board: sameOpp
          bands:
            - 0
          lesson: same-opposite
        - id: v-context
          title: Context Clues
          icon: 🔍
          sub: guess from the sentence
          board: contextClue
          bands:
            - 0
          lesson: context-clues
    - id: grammar
      title: Grammar Grove
      emoji: 🌿
      color: "#A78BFA"
      blurb: Words have jobs — build sentences that work.
      stations:
        - id: g-nouns
          title: Naming Words
          icon: 🏷️
          sub: nouns
          board: grammarNoun
          bands:
            - 0
          lesson: nouns
        - id: g-verbs
          title: Doing Words
          icon: 🏃
          sub: verbs
          board: grammarVerb
          bands:
            - 0
          lesson: verbs
        - id: g-adj
          title: Describing Words
          icon: 🎨
          sub: adjectives
          board: grammarAdj
          bands:
            - 0
          lesson: adjectives
        - id: g-build
          title: Build a Sentence
          icon: 🧱
          sub: word order
          board: sentence
          bands:
            - 0
          lesson: build-sentence
        - id: g-caps
          title: Capitals & Periods
          icon: 🔠
          sub: punctuation
          board: punctuation
          bands:
            - 0
          lesson: punctuation
    - id: reading
      title: Story Harbor
      emoji: ⚓
      color: "#F472B6"
      blurb: Read little stories and find the answers inside them.
      stations:
        - id: r-first
          title: First Readers
          icon: 📖
          sub: tiny decodable stories
          board: firstReader
          bands:
            - 0
          lesson: first-readers
        - id: r-main
          title: Main Idea
          icon: 💡
          sub: what is it about?
          board: mainIdea
          bands:
            - 0
          lesson: main-idea
        - id: r-detail
          title: Find the Detail
          icon: 🔎
          sub: answer from the text
          board: findDetail
          bands:
            - 0
          lesson: find-detail
        - id: r-infer
          title: Read Between the Lines
          icon: 🤔
          sub: inference
          board: inference
          bands:
            - 0
          lesson: inference
    - id: rules
      title: Rules & Tricks
      emoji: 💡
      color: "#FBBF24"
      blurb: Tricks that make English click.
      stations:
        - id: r-vowel
          title: Vowel Tricks
          icon: 🪄
          sub: "silent e, bossy r, vowel teams"
          board: ruleQuiz
          bands:
            - 0
          lesson: rules-vowel
        - id: r-spell
          title: Spelling Rules
          icon: ✏️
          sub: "i before e, doubling, plurals"
          board: ruleQuiz
          bands:
            - 1
          lesson: rules-spell
        - id: r-word
          title: Word Rules
          icon: 📐
          sub: "soft c & g, a vs an"
          board: ruleQuiz
          bands:
            - 2
          lesson: rules-word
    - id: sound-patterns
      title: Sound Patterns
      emoji: 🎵
      color: "#2DD4BF"
      blurb: Crack the longer words — vowel teams, bossy endings, silent letters.
      stations:
        - id: sp-teams
          title: Vowel Teams
          icon: 🤝
          sub: "ai, ee, oa, igh"
          board: soundPattern
          bands:
            - 0
          lesson: sound-patterns
        - id: sp-rdiph
          title: R-Controlled & Diphthongs
          icon: 🌀
          sub: "ar, er, oi, ow"
          board: soundPattern
          bands:
            - 1
          lesson: sound-patterns
        - id: sp-silent
          title: Silent Letters
          icon: 🤫
          sub: "kn, wr, mb, gn"
          board: soundPattern
          bands:
            - 2
          lesson: sound-patterns
    - id: spelling
      title: Spelling Bee
      emoji: 🐝
      color: "#FB7185"
      blurb: Spell it right — the words that trip everyone up.
      stations:
        - id: sb-tricky
          title: Tricky Spellings
          icon: 🍯
          sub: "said, friend, because"
          board: spellBee
          bands:
            - 0
          lesson: spelling-bee
        - id: sb-homophone
          title: Homophones
          icon: 👯
          sub: "their, to, your"
          board: spellBee
          bands:
            - 1
          lesson: spelling-bee
        - id: sb-endings
          title: Word Endings
          icon: 🧩
          sub: "-tion, doubles, -le"
          board: spellBee
          bands:
            - 2
          lesson: spelling-bee
    - id: grammar-gym
      title: Grammar Gym
      emoji: 💪
      color: "#818CF8"
      blurb: Train your grammar — build the right form.
      stations:
        - id: gg-tense
          title: Verb Tenses
          icon: ⏰
          sub: "walk → walked, jumping"
          board: wordBuild
          bands:
            - 0
          lesson: verb-tenses
        - id: gg-plural
          title: Plurals & Comparatives
          icon: 📊
          sub: "cats, boxes, bigger"
          board: wordBuild
          bands:
            - 1
          lesson: plurals-comparatives
        - id: gg-pro
          title: Pronouns & Agreement
          icon: 🔁
          sub: "she runs, give it to him"
          board: grammarDepth
          bands:
            - 0
          lesson: pronouns-agreement
        - id: gg-sent
          title: Sentence Types
          icon: ❓
          sub: "ask, tell, command, shout"
          board: grammarDepth
          bands:
            - 1
          lesson: sentence-types
    - id: word-lab
      title: Word Lab
      emoji: 🔬
      color: "#F59E0B"
      blurb: Take words apart and build new ones.
      stations:
        - id: wl-pre
          title: Prefixes
          icon: ⬅️
          sub: "un-, re-, pre-, dis-"
          board: wordBuild
          bands:
            - 2
          lesson: prefixes
        - id: wl-suf
          title: Suffixes
          icon: ➡️
          sub: "-ful, -less, -ly, -er"
          board: wordBuild
          bands:
            - 3
          lesson: suffixes
        - id: wl-fig
          title: Figurative Language
          icon: 🎭
          sub: "similes, metaphors, idioms"
          board: figurative
          bands:
            - 0
          lesson: figurative
    - id: speaking
      title: Speaking Studio
      emoji: 🎙️
      color: "#FB923C"
      blurb: Talk with Luna — real conversations, just for practice.
      soon: true
      stations:
        - id: s-intro
          title: Introduce Yourself
          icon: 👋
          sub: say hello & your name
          soon: true
        - id: s-cafe
          title: Order at a Café
          icon: 🧁
          sub: role-play
          soon: true
        - id: s-pet
          title: Describe Your Pet
          icon: 🐶
          sub: talk about something
          soon: true
        - id: s-story
          title: Tell a Story
          icon: 📚
          sub: speak in sentences
          soon: true
  lessons:
    letter-sounds:
      title: Letter Sounds
      sections:
        - id: sounds
          label: All sounds
          beats:
            - say: lph-0
              caption: Here are all our letter sounds. Tap any letter to hear the sound it makes!
              advance: hold
              view:
                kind: soundboard
                key: board
        - id: listen
          label: Listen
          beats:
            - say: lph-1
              caption: >-
                Reading starts with listening. Every letter makes its own little sound — let's hear
                a few!
              view:
                kind: letters
                key: intro
                items:
                  - s
                  - a
                  - t
                  - p
                  - i
                  - "n"
        - id: s
          label: S
          beats:
            - say: lph-2
              caption: This is the letter S. It says sss, like at the start of sun.
              view:
                kind: phoneme
                key: s
                letter: s
                word: sun
                emoji: ☀️
        - id: a
          label: A
          beats:
            - say: lph-3
              caption: This is the letter A. It says ah, like at the start of ant.
              view:
                kind: phoneme
                key: a
                letter: a
                word: ant
                emoji: 🐜
        - id: p
          label: P
          beats:
            - say: lph-4
              caption: This is the letter P. It says puh, like at the start of pig.
              view:
                kind: phoneme
                key: p
                letter: p
                word: pig
                emoji: 🐷
        - id: go
          label: Your turn
          beats:
            - say: lph-5
              caption: When you hear a sound, find the letter that makes it and tap it. Now you try!
              view:
                kind: letters
                key: go
                items:
                  - s
                  - a
                  - t
                  - p
                  - i
                  - "n"
                active: 0
    blending:
      title: Blending
      sections:
        - id: cat
          label: c-a-t
          beats:
            - say: lbl-1
              caption: Letters team up to make words. Listen to these three sounds, one at a time.
              view:
                kind: blend
                key: cat
                letters:
                  - c
                  - a
                  - t
                word: cat
            - say: lbl-2
              caption: "Now blend them together, nice and smooth: cat!"
              view:
                kind: blend
                key: cat
                letters:
                  - c
                  - a
                  - t
                word: cat
        - id: pig
          label: p-i-g
          beats:
            - say: lbl-3
              caption: Let's try another word. Sound out each letter.
              view:
                kind: blend
                key: pig
                letters:
                  - p
                  - i
                  - g
                word: pig
            - say: lbl-4
              caption: "Blend them together: pig!"
              view:
                kind: blend
                key: pig
                letters:
                  - p
                  - i
                  - g
                word: pig
        - id: go
          label: Your turn
          beats:
            - say: lbl-5
              caption: >-
                Your turn — listen to the sounds, then tap the letters in order to build the word.
                You try!
              view:
                kind: blend
                key: cat2
                letters:
                  - c
                  - a
                  - t
                word: cat
    word-families:
      title: Word Families
      sections:
        - id: fam
          label: The -at family
          beats:
            - say: lwf-1
              caption: Some words are a family — they share the very same ending. Here is the -at family.
              view:
                kind: blend
                key: cat
                letters:
                  - c
                  - a
                  - t
                word: cat
            - say: lwf-2
              caption: "Keep the ending and swap the first letter: cat becomes hat!"
              view:
                kind: blend
                key: hat
                letters:
                  - h
                  - a
                  - t
                word: hat
        - id: more
          label: Again
          beats:
            - say: lwf-3
              caption: Swap it again — now it says mat. Same family, new word!
              view:
                kind: blend
                key: mat
                letters:
                  - m
                  - a
                  - t
                word: mat
        - id: go
          label: Your turn
          beats:
            - say: lwf-4
              caption: Listen to the word, then tap the letter it starts with. You try!
              view:
                kind: blend
                key: sat
                letters:
                  - s
                  - a
                  - t
                word: sat
    digraphs:
      title: Tricky Teams
      sections:
        - id: sh
          label: sh
          beats:
            - say: ldg-1
              caption: Sometimes two letters team up to make just one new sound.
              view:
                kind: team
                key: sh
                team: sh
                sound: /sh/
                word: ship
                emoji: 🚢
            - say: ldg-2
              caption: S and H together say shh — like at the start of ship.
              view:
                kind: team
                key: sh
                team: sh
                sound: /sh/
                word: ship
                emoji: 🚢
        - id: ch
          label: ch
          beats:
            - say: ldg-3
              caption: C and H together say ch — like at the start of chip.
              view:
                kind: team
                key: ch
                team: ch
                sound: /ch/
                word: chip
                emoji: 🍟
        - id: th
          label: th
          beats:
            - say: ldg-4
              caption: T and H together say th — like at the start of thumb.
              view:
                kind: team
                key: th
                team: th
                sound: /th/
                word: thumb
                emoji: 👍
        - id: go
          label: Your turn
          beats:
            - say: ldg-5
              caption: Listen for the team sound, then tap the two letters that make it. You try!
              view:
                kind: team
                key: ck
                team: ck
                sound: /k/
                word: duck
                emoji: 🦆
    picture-match:
      title: Picture Match
      sections:
        - id: cat
          label: cat
          beats:
            - say: lpm-1
              caption: Welcome to Word Woods! Here we match words to pictures. Look — this is a cat.
              view:
                kind: picture
                key: cat
                emoji: 🐱
                word: cat
        - id: dog
          label: dog
          beats:
            - say: lpm-2
              caption: And this one is a dog. Every picture has a word that names it.
              view:
                kind: picture
                key: dog
                emoji: 🐶
                word: dog
        - id: go
          label: Your turn
          beats:
            - say: lpm-3
              caption: Look at the picture, then tap the word that matches it. You try!
              view:
                kind: picture
                key: fish
                emoji: 🐟
                word: fish
    sight-words:
      title: Sight Words
      sections:
        - id: the
          label: the
          beats:
            - say: lsw-1
              caption: >-
                Some little words pop up everywhere, so we learn them by sight — quick as a flash!
                Here's one: the.
              view:
                kind: picture
                key: the
                emoji: 👀
                word: the
        - id: and
          label: and
          beats:
            - say: lsw-2
              caption: "Here's another we see all the time: and."
              view:
                kind: picture
                key: and
                emoji: 👀
                word: and
        - id: go
          label: Your turn
          beats:
            - say: lsw-3
              caption: Listen, then tap the word you hear. You'll know these in no time. You try!
              view:
                kind: picture
                key: you
                emoji: 👀
                word: you
    same-opposite:
      title: Same or Opposite
      sections:
        - id: same
          label: Same
          beats:
            - say: lso-1
              caption: Some words mean almost the same thing. Big and large both mean really big!
              view:
                kind: pair
                key: same
                a: big
                b: large
                rel: same
        - id: opp
          label: Opposite
          beats:
            - say: lso-2
              caption: Other words are opposites — they mean the very opposite. Like hot and cold!
              view:
                kind: pair
                key: opp
                a: hot
                b: cold
                rel: opposite
        - id: go
          label: Your turn
          beats:
            - say: lso-3
              caption: I'll show you a word. Tap the one that means the same, or the opposite. You try!
              view:
                kind: pair
                key: go
                a: up
                b: down
                rel: opposite
    context-clues:
      title: Context Clues
      sections:
        - id: clue
          label: The clue
          beats:
            - say: lcc-1
              caption: Sometimes a word is missing from a sentence — but the other words give you clues!
              view:
                kind: cloze
                key: bed
                sentence: I sleep in my ___.
            - say: lcc-2
              caption: "Read: I sleep in my blank. 'Sleep' is the clue, so the missing word is bed!"
              view:
                kind: cloze
                key: bed
                sentence: I sleep in my ___.
                answer: bed
        - id: go
          label: Your turn
          beats:
            - say: lcc-3
              caption: Read the whole sentence, look for the clues, then tap the word that fits. You try!
              view:
                kind: cloze
                key: sun
                sentence: The ___ shines in the sky.
    nouns:
      title: Naming Words
      sections:
        - id: what
          label: Nouns
          beats:
            - say: lgn-1
              caption: >-
                A naming word — a noun — names a person, a place, or a thing. Like cat, hat, and
                bus!
              view:
                kind: examples
                key: "n"
                label: naming words
                words:
                  - cat
                  - hat
                  - bus
        - id: go
          label: Your turn
          beats:
            - say: lgn-2
              caption: I'll show some words. Tap the one that names a thing. You try!
              view:
                kind: examples
                key: n2
                label: naming words
                words:
                  - dog
                  - box
                  - sun
    verbs:
      title: Doing Words
      sections:
        - id: what
          label: Verbs
          beats:
            - say: lgv-1
              caption: A doing word — a verb — is an action you can do. Like run, jump, and eat!
              view:
                kind: examples
                key: v
                label: doing words
                words:
                  - run
                  - jump
                  - eat
        - id: go
          label: Your turn
          beats:
            - say: lgv-2
              caption: Tap the word that shows an action. You try!
              view:
                kind: examples
                key: v2
                label: doing words
                words:
                  - hop
                  - swim
                  - sing
    adjectives:
      title: Describing Words
      sections:
        - id: what
          label: Adjectives
          beats:
            - say: lga-1
              caption: >-
                A describing word — an adjective — tells us more about something. Like big, hot, and
                happy!
              view:
                kind: examples
                key: a
                label: describing words
                words:
                  - big
                  - hot
                  - happy
        - id: go
          label: Your turn
          beats:
            - say: lga-2
              caption: Tap the word that describes something. You try!
              view:
                kind: examples
                key: a2
                label: describing words
                words:
                  - small
                  - cold
                  - soft
    build-sentence:
      title: Build a Sentence
      sections:
        - id: order
          label: Word order
          beats:
            - say: lgb-1
              caption: >-
                A sentence puts words in an order that makes sense. The cat is big — that sounds
                right!
              view:
                kind: sentence
                key: s1
                text: The cat is big.
        - id: go
          label: Your turn
          beats:
            - say: lgb-2
              caption: Tap the words one by one, in the right order, to build the sentence. You try!
              view:
                kind: sentence
                key: s2
                text: I see a dog.
    punctuation:
      title: Capitals & Periods
      sections:
        - id: rule
          label: The rule
          beats:
            - say: lgc-1
              caption: Every sentence starts with a capital letter and ends with a period. The dog can run.
              view:
                kind: sentence
                key: c1
                text: The dog can run.
        - id: go
          label: Your turn
          beats:
            - say: lgc-2
              caption: >-
                Tap the sentence that is written the right way — capital at the start, period at the
                end. You try!
              view:
                kind: sentence
                key: c2
                text: The sun is hot.
    first-readers:
      title: First Readers
      sections:
        - id: read
          label: Reading
          beats:
            - say: lrf-1
              caption: >-
                Now we put words together to read a whole sentence! Here is one: the cat sat on the
                mat.
              view:
                kind: sentence
                key: r1
                text: The cat sat on the mat.
            - say: lrf-2
              caption: Listen as I read it, word by word. The glowing word is the one I am saying — follow along!
              view:
                kind: sentence
                key: r2
                text: The cat sat on the mat.
        - id: go
          label: Your turn
          beats:
            - say: lrf-3
              caption: Your turn! Read along with me, then tap the word you hear. You try!
              view:
                kind: sentence
                key: r3
                text: You can read!
    main-idea:
      title: Main Idea
      sections:
        - id: idea
          label: The big idea
          beats:
            - say: lmi-1
              caption: Every story is ABOUT something. This little story is all about a cat.
              view:
                kind: sentence
                key: m1
                text: The cat sat. The cat can nap.
            - say: lmi-2
              caption: The main idea is the big thing the whole story is about — here, it is the cat!
              view:
                kind: picture
                key: m2
                emoji: 🐱
                word: cat
        - id: go
          label: Your turn
          beats:
            - say: lmi-3
              caption: "When you read, ask yourself: what is this story about? You try!"
              view:
                kind: sentence
                key: m3
                text: What is it about?
    find-detail:
      title: Find the Detail
      sections:
        - id: detail
          label: The detail
          beats:
            - say: lfd-1
              caption: Stories are full of little details. Read carefully and the answer is right there in the words.
              view:
                kind: sentence
                key: d1
                text: The hen sat on the egg.
            - say: lfd-2
              caption: "The hen sat on the egg. So where did the hen sit? On the egg — we found the detail!"
              view:
                kind: sentence
                key: d2
                text: The hen sat on the egg.
        - id: go
          label: Your turn
          beats:
            - say: lfd-3
              caption: Read the story, then find the detail the question asks for. You try!
              view:
                kind: sentence
                key: d3
                text: Find the answer!
    inference:
      title: Read Between the Lines
      sections:
        - id: clue
          label: Use clues
          beats:
            - say: lin-1
              caption: Sometimes the answer is not written down. We use clues to figure it out.
              view:
                kind: sentence
                key: i1
                text: The dog can run and jump.
            - say: lin-2
              caption: A dog that runs and jumps must feel happy! We read between the lines.
              view:
                kind: picture
                key: i2
                emoji: 😄
                word: happy
        - id: go
          label: Your turn
          beats:
            - say: lin-3
              caption: Use the clues in the story to guess how someone feels. You try!
              view:
                kind: sentence
                key: i3
                text: How does it feel?
    rules-vowel:
      title: Vowel Tricks
      sections:
        - id: magic-e
          label: Magic E
          beats:
            - say: la-rules-vowel-1
              caption: >-
                A silent E at the end makes the vowel say its name: cap becomes cape,
                kit becomes kite, not becomes note.
              view:
                kind: picture
                key: magic-e
                emoji: 💡
                word: cape
        - id: bossy-r
          label: Bossy R
          beats:
            - say: la-rules-vowel-2
              caption: >-
                When R follows a vowel it is bossy — it changes the sound: ar in car,
                er in her, ir in bird, or in fork, ur in burn.
              view:
                kind: picture
                key: bossy-r
                emoji: 💡
                word: car
        - id: vowel-teams
          label: Vowel Teams
          beats:
            - say: la-rules-vowel-3
              caption: >-
                When two vowels go walking, the first one does the talking: rain, boat, team.
                The first vowel says its name and the second stays quiet.
              view:
                kind: picture
                key: vowel-teams
                emoji: 💡
                word: rain
        - id: go
          label: Your turn
          beats:
            - say: la-rules-vowel-4
              caption: Your turn! Pick the word that follows the rule.
              view:
                kind: picture
                key: rules-vowel-go
                emoji: 🪄
                word: rules
    rules-spell:
      title: Spelling Rules
      sections:
        - id: i-before-e
          label: I before E
          beats:
            - say: la-rules-spell-1
              caption: >-
                I before E, except after C — or when it sounds like A, as in neighbor
                and weigh. So believe and chief, but receive.
              view:
                kind: picture
                key: i-before-e
                emoji: 💡
                word: believe
        - id: doubling
          label: Doubling
          beats:
            - say: la-rules-spell-2
              caption: >-
                One syllable, one vowel, one final consonant — double it before adding
                -ing or -ed: run becomes running, hop becomes hopping.
              view:
                kind: picture
                key: doubling
                emoji: 💡
                word: hopping
        - id: plurals
          label: Plurals
          beats:
            - say: la-rules-spell-3
              caption: >-
                Add -es after ch, sh, s, or x: boxes, dishes. Change y to i then add
                -es: baby becomes babies.
              view:
                kind: picture
                key: plurals
                emoji: 💡
                word: babies
        - id: go
          label: Your turn
          beats:
            - say: la-rules-spell-4
              caption: Your turn! Pick the word that follows the rule.
              view:
                kind: picture
                key: rules-spell-go
                emoji: ✏️
                word: rules
    rules-word:
      title: Word Rules
      sections:
        - id: soft-cg
          label: Soft C and G
          beats:
            - say: la-rules-word-1
              caption: >-
                C and G go soft before e, i, or y: city and gem. Before other letters
                they stay hard: cat and go.
              view:
                kind: picture
                key: soft-cg
                emoji: 💡
                word: city
        - id: a-an
          label: A or An
          beats:
            - say: la-rules-word-2
              caption: >-
                Use an before a vowel sound: an apple, an egg. Use a before a consonant
                sound: a cat, a dog.
              view:
                kind: picture
                key: a-an
                emoji: 💡
                word: "an apple"
        - id: q-needs-u
          label: Q needs U
          beats:
            - say: la-rules-word-3
              caption: >-
                Q is almost always followed by U: queen, quick, quiet. You will hardly
                ever see Q without a U beside it.
              view:
                kind: picture
                key: q-needs-u
                emoji: 💡
                word: queen
        - id: go
          label: Your turn
          beats:
            - say: la-rules-word-4
              caption: Your turn! Pick the word that follows the rule.
              view:
                kind: picture
                key: rules-word-go
                emoji: 📐
                word: rules
    sound-patterns:
      title: Sound Patterns
      sections:
        - id: vowel-teams
          label: Vowel Teams
          beats:
            - say: la-sp-1
              caption: >-
                Long vowels often travel in teams of two letters. ai and ay say long A, like rain
                and play. ee and ea say long E, like feet and leaf. oa and ow say long O, like
                boat and snow.
              view:
                kind: picture
                key: sp-teams
                emoji: 🎵
                word: rain
        - id: r-controlled
          label: Bossy Endings
          beats:
            - say: la-sp-2
              caption: >-
                When r follows a vowel it changes the sound: ar in car, or in fork, and er, ir,
                and ur all make the er sound, like bird, her, and turn.
              view:
                kind: picture
                key: sp-rcontrolled
                emoji: 🌀
                word: star
        - id: silent-letters
          label: Silent Letters
          beats:
            - say: la-sp-3
              caption: >-
                Some letters hide and stay silent. The k in knee, the w in write, the b in lamb,
                the g in sign. You don't hear them, but you still spell them!
              view:
                kind: picture
                key: sp-silent
                emoji: 🤫
                word: knee
        - id: go
          label: Your turn
          beats:
            - say: la-sp-4
              caption: Your turn! Pick the word that fits the pattern.
              view:
                kind: picture
                key: sound-patterns-go
                emoji: 🎵
                word: patterns
    spelling-bee:
      title: Spelling Bee
      sections:
        - id: tricky
          label: Tricky Words
          beats:
            - say: la-sb-1
              caption: >-
                Some words don't follow the rules — you just have to remember them, like
                said, friend, and because.
              view:
                kind: picture
                key: sb-tricky
                emoji: 🐝
                word: friend
        - id: homophones
          label: Homophones
          beats:
            - say: la-sb-2
              caption: >-
                Homophones sound the same but mean different things. their shows belonging, there
                is a place, and they're means they are.
              view:
                kind: picture
                key: sb-homophones
                emoji: 👯
                word: their
        - id: endings
          label: Word Endings
          beats:
            - say: la-sb-3
              caption: >-
                Word endings have patterns too. The shun sound is spelled t i o n, like nation.
                After a short vowel, double the consonant, like letter.
              view:
                kind: picture
                key: sb-endings
                emoji: 🧩
                word: nation
        - id: go
          label: Your turn
          beats:
            - say: la-sb-4
              caption: Your turn! Pick the word that is spelled correctly.
              view:
                kind: picture
                key: spelling-bee-go
                emoji: 🐝
                word: spelling
    verb-tenses:
      title: Verb Tenses
      sections:
        - id: teach
          label: Verb Tenses
          beats:
            - say: la-vt-1
              caption: >-
                Verbs can change to show time. Add -ed for the past, like walk becomes walked. Add
                -ing for right now, like jump becomes jumping.
              view:
                kind: picture
                key: gg-tense
                emoji: ⏰
                word: walked
        - id: go
          label: Your turn
          beats:
            - say: la-build-go
              caption: Your turn! Tap the parts to build the word.
              view:
                kind: picture
                key: gg-build-go
                emoji: 💪
                word: build
    plurals-comparatives:
      title: Plurals & Comparatives
      sections:
        - id: teach
          label: Plurals & Comparatives
          beats:
            - say: la-pc-1
              caption: >-
                Add -s or -es to mean more than one, like one cat, two cats, and one box, two
                boxes. Add -er to compare two things, like big becomes bigger.
              view:
                kind: picture
                key: gg-plural
                emoji: 📊
                word: bigger
        - id: go
          label: Your turn
          beats:
            - say: la-build-go
              caption: Your turn! Tap the parts to build the word.
              view:
                kind: picture
                key: gg-build-go
                emoji: 💪
                word: build
    pronouns-agreement:
      title: Pronouns & Agreement
      sections:
        - id: teach
          label: Pronouns & Agreement
          beats:
            - say: la-pa-1
              caption: >-
                Use he, she, and they instead of a name. And for he, she, or it, the verb adds an
                -s, like she runs and he jumps.
              view:
                kind: picture
                key: gg-pro
                emoji: 🔁
                word: runs
        - id: go
          label: Your turn
          beats:
            - say: la-pick-go
              caption: Your turn! Pick the one that is correct.
              view:
                kind: picture
                key: gg-pick-go
                emoji: 💪
                word: pick
    sentence-types:
      title: Sentence Types
      sections:
        - id: teach
          label: Sentence Types
          beats:
            - say: la-st-1
              caption: >-
                Sentences have jobs. A telling sentence ends with a period. A question ends with a
                question mark. An excited sentence ends with an exclamation mark.
              view:
                kind: picture
                key: gg-sent
                emoji: ❓
                word: question
        - id: go
          label: Your turn
          beats:
            - say: la-pick-go
              caption: Your turn! Pick the one that is correct.
              view:
                kind: picture
                key: gg-pick-go
                emoji: 💪
                word: pick
    prefixes:
      title: Prefixes
      sections:
        - id: teach
          label: Prefixes
          beats:
            - say: la-pre-1
              caption: >-
                A prefix goes at the front of a word and changes its meaning. un- means not, so
                unhappy means not happy. re- means again, so redo means do again.
              view:
                kind: picture
                key: wl-pre
                emoji: ⬅️
                word: unhappy
        - id: go
          label: Your turn
          beats:
            - say: la-build-go
              caption: Your turn! Tap the parts to build the word.
              view:
                kind: picture
                key: wl-build-go
                emoji: 🔬
                word: build
    suffixes:
      title: Suffixes
      sections:
        - id: teach
          label: Suffixes
          beats:
            - say: la-suf-1
              caption: >-
                A suffix goes at the end of a word. -ful means full of, so helpful means full of
                help. -less means without, so careless means without care.
              view:
                kind: picture
                key: wl-suf
                emoji: ➡️
                word: helpful
        - id: go
          label: Your turn
          beats:
            - say: la-build-go
              caption: Your turn! Tap the parts to build the word.
              view:
                kind: picture
                key: wl-build-go
                emoji: 🔬
                word: build
    figurative:
      title: Figurative Language
      sections:
        - id: teach
          label: Figurative Language
          beats:
            - say: la-fig-1
              caption: >-
                Sometimes words paint pictures. A simile compares using like or as, like as busy
                as a bee. A metaphor says one thing is another, like the sky is a blanket.
              view:
                kind: picture
                key: wl-fig
                emoji: 🎭
                word: simile
        - id: go
          label: Your turn
          beats:
            - say: la-pick-go
              caption: Your turn! Pick the one that is correct.
              view:
                kind: picture
                key: wl-pick-go
                emoji: 🔬
                word: pick
  narration:
    lph-0: Here are all our letter sounds. Tap any letter to hear the sound it makes!
    lph-1: Reading starts with listening. Every letter makes its own little sound — let's hear a few!
    lph-2: This is the letter S. It says sss, like at the start of sun.
    lph-3: This is the letter A. It says ah, like at the start of ant.
    lph-4: This is the letter P. It says puh, like at the start of pig.
    lph-5: When you hear a sound, find the letter that makes it and tap it. Now you try!
    lbl-1: Letters team up to make words. Listen to these three sounds, one at a time.
    lbl-2: "Now blend them together, nice and smooth: cat!"
    lbl-3: Let's try another word. Sound out each letter.
    lbl-4: "Blend them together: pig!"
    lbl-5: Your turn — listen to the sounds, then tap the letters in order to build the word. You try!
    lwf-1: Some words are a family — they share the very same ending. Here is the -at family.
    lwf-2: "Keep the ending and swap the first letter: cat becomes hat!"
    lwf-3: Swap it again — now it says mat. Same family, new word!
    lwf-4: Listen to the word, then tap the letter it starts with. You try!
    ldg-1: Sometimes two letters team up to make just one new sound.
    ldg-2: S and H together say shh — like at the start of ship.
    ldg-3: C and H together say ch — like at the start of chip.
    ldg-4: T and H together say th — like at the start of thumb.
    ldg-5: Listen for the team sound, then tap the two letters that make it. You try!
    lpm-1: Welcome to Word Woods! Here we match words to pictures. Look — this is a cat.
    lpm-2: And this one is a dog. Every picture has a word that names it.
    lpm-3: Look at the picture, then tap the word that matches it. You try!
    lsw-1: >-
      Some little words pop up everywhere, so we learn them by sight — quick as a flash! Here's one:
      the.
    lsw-2: "Here's another we see all the time: and."
    lsw-3: Listen, then tap the word you hear. You'll know these in no time. You try!
    lso-1: Some words mean almost the same thing. Big and large both mean really big!
    lso-2: Other words are opposites — they mean the very opposite. Like hot and cold!
    lso-3: I'll show you a word. Tap the one that means the same, or the opposite. You try!
    lcc-1: Sometimes a word is missing from a sentence — but the other words give you clues!
    lcc-2: "Read: I sleep in my blank. 'Sleep' is the clue, so the missing word is bed!"
    lcc-3: Read the whole sentence, look for the clues, then tap the word that fits. You try!
    lgn-1: A naming word — a noun — names a person, a place, or a thing. Like cat, hat, and bus!
    lgn-2: I'll show some words. Tap the one that names a thing. You try!
    lgv-1: A doing word — a verb — is an action you can do. Like run, jump, and eat!
    lgv-2: Tap the word that shows an action. You try!
    lga-1: A describing word — an adjective — tells us more about something. Like big, hot, and happy!
    lga-2: Tap the word that describes something. You try!
    lgb-1: A sentence puts words in an order that makes sense. The cat is big — that sounds right!
    lgb-2: Tap the words one by one, in the right order, to build the sentence. You try!
    lgc-1: Every sentence starts with a capital letter and ends with a period. The dog can run.
    lgc-2: >-
      Tap the sentence that is written the right way — capital at the start, period at the end. You
      try!
    lrf-1: >-
      Now we put words together to read a whole sentence! Here is one: the cat sat on the mat.
    lrf-2: Listen as I read it, word by word. The glowing word is the one I am saying — follow along!
    lrf-3: Your turn! Read along with me, then tap the word you hear. You try!
    lmi-1: Every story is ABOUT something. This little story is all about a cat.
    lmi-2: The main idea is the big thing the whole story is about — here, it is the cat!
    lmi-3: "When you read, ask yourself: what is this story about? You try!"
    lfd-1: Stories are full of little details. Read carefully and the answer is right there in the words.
    lfd-2: "The hen sat on the egg. So where did the hen sit? On the egg — we found the detail!"
    lfd-3: Read the story, then find the detail the question asks for. You try!
    lin-1: Sometimes the answer is not written down. We use clues to figure it out.
    lin-2: A dog that runs and jumps must feel happy! We read between the lines.
    lin-3: Use the clues in the story to guess how someone feels. You try!
